<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>CaptaDelivery Admin</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#007BFF', primaryDark: '#0056b3' } } }
    };
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #f3f4f6; overflow-x: hidden; }

    .sidebar {
      background: #1e293b;
      min-height: 100vh;
      width: 280px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      position: fixed;
      top:0; left:0;
      z-index:40;
      overflow-y:auto;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar a {
      display: flex; align-items: center;
      padding: 12px 20px;
      color: #cbd5e1;
      transition: 0.2s;
      border-left: 3px solid transparent;
      font-size: 0.95rem;
      gap: 12px;
      border-radius: 0 8px 8px 0;
      margin: 2px 8px 2px 0;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #334155;
      color: white;
      border-left-color: #007BFF;
    }
    .sidebar a i { width: 22px; text-align: center; font-size: 1.1rem; flex-shrink:0; }
    .sidebar a span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-brand {
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .sidebar-brand i { color: #007BFF; }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index:39;
      backdrop-filter: blur(4px);
    }
    .sidebar-backdrop.active { display: block; }

    .main-content {
      margin-left: 0;
      padding: 16px;
      min-height: 100vh;
      transition: margin 0.3s ease;
      padding-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      flex-wrap: wrap;
    }
    .top-bar .page-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar .page-title .menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: white;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      color: #1e293b;
      font-size: 1.2rem;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .top-bar .page-title .menu-btn:hover { background: #f1f5f9; }
    .top-bar .page-title h1 { font-size: 1.25rem; font-weight: 700; }
    .top-bar .right-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar .right-actions .theme-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: white;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      color: #64748b;
      font-size: 1.1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-bar .right-actions .theme-btn:hover { background: #f1f5f9; }
    .top-bar .right-actions .admin-badge {
      background: #e2e8f0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #475569;
      display: none;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: 0.2s;
      overflow: hidden;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .stat-card {
      padding: 16px;
      border-radius: 14px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: 0.2s;
    }
    .stat-card:active { transform: scale(0.97); }
    .stat-card .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink:0;
      font-size: 1.1rem;
    }
    .stat-card .stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
    }
    @media (min-width:480px) { .stat-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width:768px) { .stat-grid { grid-template-columns: repeat(4,1fr); } }
    @media (min-width:1024px) { .stat-grid { grid-template-columns: repeat(6,1fr); } }

    .tab-btn {
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      font-size: 0.85rem;
      border: none;
      background: transparent;
      color: #64748b;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: #007BFF;
      color: white;
      box-shadow: 0 4px 12px rgba(0,123,255,0.25);
    }
    .tab-btn:hover:not(.active) { background: #e2e8f0; }

    .tab-group-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-group-scroll::-webkit-scrollbar { display: none; }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -4px;
      padding: 0 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 600px;
    }
    th {
      background: #f8fafc;
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e9edf2;
      vertical-align: middle;
    }
    tr:hover td { background: #f8fafc; }

    .table-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .table-actions .btn { padding: 4px 10px; font-size: 0.75rem; border-radius: 8px; }

    .badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .badge-secondary { background: #e5e7eb; color: #374151; }

    .btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      touch-action: manipulation;
      user-select: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #007BFF; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }
    .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
    .btn-outline:hover { background: #f3f4f6; }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }

    .modal-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index:999;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      max-height: 90vh;
      overflow-y: auto;
      width: 100%;
      max-width: 560px;
      padding: 20px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      margin: 12px;
    }
    .modal-box .modal-close {
      position: sticky;
      top:0;
      float:right;
      background:none;
      border:none;
      font-size:1.5rem;
      color:#94a3b8;
      cursor:pointer;
      padding:4px 8px;
      z-index:10;
    }
    .modal-box .modal-close:hover { color:#1e293b; }
    .modal-box h2 { font-size:1.3rem; font-weight:700; margin-bottom:16px; padding-right:40px; }

    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-weight:500; font-size:0.85rem; margin-bottom:4px; color:#374151; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%;
      padding:10px 14px;
      border:1px solid #d1d5db;
      border-radius:10px;
      outline:none;
      transition:0.2s;
      font-size:0.95rem;
      background:white;
      -webkit-appearance:none;
      appearance:none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#007BFF;
      box-shadow:0 0 0 3px rgba(0,123,255,0.15);
    }
    .form-group textarea { resize:vertical; min-height:60px; }

    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .image-preview-grid .preview-item {
      position: relative;
      width: 68px; height: 68px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #e5e7eb;
      flex-shrink:0;
    }
    .image-preview-grid .preview-item img { width:100%; height:100%; object-fit:cover; }
    .image-preview-grid .preview-item .remove-img {
      position: absolute;
      top: -6px; right: -6px;
      width: 20px; height: 20px;
      background: #ef4444;
      color: white;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      border: 2px solid white;
      transition: 0.2s;
      touch-action: manipulation;
    }
    .image-preview-grid .preview-item .remove-img:active { transform: scale(0.85); }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      left:0; top:0;
      opacity:0;
      width:100%; height:100%;
      cursor:pointer;
    }
    .file-input-wrapper .file-btn {
      width:100%;
      padding:12px;
      border:2px dashed #d1d5db;
      border-radius:12px;
      background:#f8fafc;
      color:#64748b;
      font-size:0.9rem;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:0.2s;
      cursor:pointer;
    }
    .file-input-wrapper .file-btn:hover { border-color:#007BFF; background:#eff6ff; }
    .file-input-wrapper .file-btn:active { transform:scale(0.98); }

    #notificationContainer {
      position: fixed;
      top: 12px;
      right: 12px;
      left: 12px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    #notificationContainer .toast {
      pointer-events: auto;
      background: #1e293b;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }
    #notificationContainer .toast i { color:#22c55e; font-size:1.1rem; flex-shrink:0; }
    @keyframes slideIn {
      from { transform:translateX(100%); opacity:0; }
      to { transform:translateX(0); opacity:1; }
    }

    .hide-mobile { display: none !important; }
    @media (min-width:768px) {
      .hide-mobile { display: inline-flex !important; }
      .show-mobile { display: none !important; }
    }
    .show-mobile { display: inline-flex !important; }

    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }

    .gap-1 { gap:4px; } .gap-2 { gap:8px; } .gap-3 { gap:12px; }
    .flex-wrap { flex-wrap:wrap; } .items-center { align-items:center; } .justify-between { justify-content:space-between; }
    .text-truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
    @media (min-width:480px) { .text-truncate { max-width:200px; } }

    .fade-in { animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .chart-container { position:relative; height:200px; width:100%; }
    @media (max-width:480px) { .chart-container { height:160px; } }
    .dashboard-charts { display:grid; grid-template-columns:1fr; gap:16px; }
    @media (min-width:768px) { .dashboard-charts { grid-template-columns:1fr 1fr; } }

    @media (min-width:768px) {
      .sidebar {
        transform: none !important;
        position: fixed;
        left:0; top:0;
        width:280px;
        display: block !important;
        z-index:30;
      }
      .sidebar-backdrop { display: none !important; }
      .main-content { margin-left:280px; padding:24px 32px; }
      .top-bar .page-title .menu-btn { display: none !important; }
      .top-bar .right-actions .admin-badge { display: inline-flex !important; }
      .hide-mobile { display: table-cell !important; }
    }

    .dark .card { background:#1e293b; color:#e2e8f0; }
    .dark .stat-card { background:#1e293b; color:#e2e8f0; }
    .dark .table-wrap table th { background:#1e293b; color:#94a3b8; }
    .dark .table-wrap table td { border-bottom-color:#334155; }
    .dark .table-wrap tr:hover td { background:#2d3a4f; }
    .dark .form-group input, .dark .form-group select { background:#0f172a; border-color:#334155; color:#e2e8f0; }
    .dark .form-group input:focus, .dark .form-group select:focus { border-color:#007BFF; box-shadow:0 0 0 3px rgba(0,123,255,0.2); }
    .dark .modal-box { background:#1e293b; color:#e2e8f0; }
    .dark .modal-box .modal-close { color:#94a3b8; }
    .dark .modal-box .modal-close:hover { color:#e2e8f0; }
    .dark .tab-btn:hover:not(.active) { background:#334155; }
    .dark .tab-btn:not(.active) { color:#94a3b8; }
    .dark .badge-secondary { background:#334155; color:#94a3b8; }
    .dark .top-bar .page-title { color:#e2e8f0; }
    .dark .top-bar .page-title .menu-btn { background:#1e293b; color:#e2e8f0; border:1px solid #334155; }
    .dark .top-bar .right-actions .theme-btn { background:#1e293b; color:#e2e8f0; border:1px solid #334155; }
    .dark .top-bar .right-actions .admin-badge { background:#334155; color:#94a3b8; }
    .dark .file-input-wrapper .file-btn { background:#0f172a; border-color:#334155; color:#94a3b8; }
    .dark .file-input-wrapper .file-btn:hover { border-color:#007BFF; background:#1a2a4a; }
    .dark #notificationContainer .toast { background:#1e293b; border:1px solid #334155; }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #007BFF;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Mobile fixes */
    @media (max-width: 767px) {
      .btn-block {
        font-size: 0.8rem !important;
        padding: 8px 12px !important;
        min-height: 44px;
      }
      .top-bar .page-title h1 {
        font-size: 1rem !important;
      }
      .modal-box {
        padding: 12px !important;
        margin: 8px !important;
      }
      .form-group input, .form-group select, .form-group textarea {
        font-size: 0.85rem !important;
        padding: 8px 10px !important;
      }
      .tab-btn {
        font-size: 0.75rem !important;
        padding: 6px 10px !important;
      }
    }
  </style>
</head>
<body>

<!-- ========== ADMIN LOGIN OVERLAY ========== -->
<div id="adminLoginOverlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-900/80 backdrop-blur-sm">
  <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md w-full shadow-2xl">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 dark:text-white">Admin Login</h2>
    <p class="text-sm text-center text-gray-500 dark:text-gray-400 mb-4">Enter your registered admin phone</p>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Phone</label>
        <input type="tel" id="adminPhone" placeholder="Enter admin phone" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" />
      </div>
      <div id="adminOtpSection" class="hidden">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">OTP</label>
        <div class="flex gap-2">
          <input type="text" id="adminOtp" placeholder="Enter OTP" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" />
          <button onclick="verifyAdminOtp()" class="btn btn-primary px-6 py-3 rounded-xl font-semibold">Verify</button>
        </div>
      </div>
      <button onclick="sendAdminOtp()" id="adminSendOtpBtn" class="btn btn-primary w-full text-white py-3 rounded-xl font-semibold">Send OTP</button>
    </div>
    <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-4">OTP will be sent to your phone. Check console if not received.</p>
  </div>
</div>

<!-- ========== SIDEBAR BACKDROP ========== -->
<div id="sidebarBackdrop" class="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- ========== SIDEBAR ========== -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-brand">
    <i class="fas fa-store"></i>
    <span>CaptaDelivery</span>
  </div>
  <nav class="mt-2" id="sidebarNav">
    <a href="#" data-page="dashboard" class="active"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
    <a href="#" data-page="catalog"><i class="fas fa-boxes"></i><span>Catalog</span></a>
    <a href="#" data-page="places"><i class="fas fa-map-pin"></i><span>Delivery Places</span></a>
    <a href="#" data-page="customers"><i class="fas fa-users"></i><span>Customers</span></a>
    <a href="#" data-page="orders"><i class="fas fa-truck"></i><span>Orders</span></a>
    <a href="#" data-page="earnings"><i class="fas fa-coins"></i><span>Earnings</span></a>
    <a href="#" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
    <a href="#" data-page="bestselling"><i class="fas fa-crown"></i><span>Best Selling</span></a>
    <a href="#" data-page="offers"><i class="fas fa-tags"></i><span>Offers</span></a>
    <a href="#" data-page="notifications"><i class="fas fa-bell"></i><span>Notifications</span></a>
    <a href="#" data-page="whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <a href="#" data-page="settings"><i class="fas fa-cog"></i><span>Settings</span></a>
  </nav>
  <div class="absolute bottom-4 left-0 w-full px-4 space-y-1">
    <a href="#" onclick="logoutAdmin()" class="text-red-400 hover:text-red-300 block px-4 py-2 flex items-center gap-3">
      <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
    </a>
    <a href="index.html" class="text-gray-400 hover:text-white block px-4 py-2 flex items-center gap-3">
      <i class="fas fa-store-alt"></i> <span>Back to Store</span>
    </a>
  </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div id="mainContent" class="main-content">

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <div class="page-title">
      <button class="menu-btn show-mobile" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1 id="pageTitle">Dashboard</h1>
    </div>
    <div class="right-actions">
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <span class="admin-badge"><i class="fas fa-user-shield mr-1"></i> Admin</span>
    </div>
  </div>

  <!-- ===== PAGE CONTENT ===== -->
  <div id="pageContent" class="fade-in"></div>
</div>

<!-- ========== MODAL CONTAINER ========== -->
<div id="modalContainer" class="fixed inset-0 hidden modal-overlay" style="display:none;">
  <div class="modal-box">
    <button id="closeModal" class="modal-close"><i class="fas fa-times"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ========== TOAST CONTAINER ========== -->
<div id="notificationContainer"></div>

<script>
  // ============================================================
  // API BASE
  // ============================================================
  const API_BASE = window.location.origin + '/api';

  // ============================================================
  // DATA HELPERS
  // ============================================================
  async function fetchData(endpoint) {
    const res = await fetch(`${API_BASE}/${endpoint}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }
  async function postData(endpoint, data) {
    const res = await fetch(`${API_BASE}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }
  async function putData(endpoint, data) {
    const res = await fetch(`${API_BASE}/${endpoint}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }
  async function deleteData(endpoint) {
    const res = await fetch(`${API_BASE}/${endpoint}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }

  // ============================================================
  // GLOBAL STATE
  // ============================================================
  let categories = [];
  let restaurants = [];
  let products = [];
  let places = [];
  let customers = [];
  let orders = [];
  let offers = [];
  let settings = {};
  let notifications = [];
  let currentPage = 'dashboard';
  let catalogTab = 'categories';
  let adminPhonesList = [];

  // ============================================================
  // TOAST
  // ============================================================
  function showToast(msg) {
    const container = document.getElementById('notificationContainer');
    if (!container) { alert(msg); return; }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      toast.style.transition = '0.3s ease';
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  // ============================================================
  // SIDEBAR / MODAL / THEME
  // ============================================================
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarBackdrop').classList.toggle('active');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('active');
  }

  function openModal(html) {
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalContainer').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('modalContainer').style.display = 'none';
    document.body.style.overflow = '';
  }
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('modalContainer').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  let darkMode = localStorage.getItem('capta_darkMode') === 'true';
  if (darkMode) document.documentElement.classList.add('dark');
  document.getElementById('themeToggle').addEventListener('click', function() {
    darkMode = !darkMode;
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('capta_darkMode', darkMode);
    this.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  });

  // ============================================================
  // NAVIGATION
  // ============================================================
  document.querySelectorAll('#sidebarNav a').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      navigateTo(this.dataset.page);
      closeSidebar();
    });
  });

  function navigateTo(page) {
    currentPage = page;
    document.querySelectorAll('#sidebarNav a').forEach(a => a.classList.remove('active'));
    const sidebarLink = document.querySelector(`#sidebarNav a[data-page="${page}"]`);
    if (sidebarLink) sidebarLink.classList.add('active');

    const titles = {
      dashboard: 'Dashboard',
      catalog: 'Catalog',
      places: 'Delivery Places',
      customers: 'Customers',
      orders: 'Orders',
      earnings: 'Earnings',
      reports: 'Reports',
      bestselling: 'Best Selling',
      offers: 'Offers',
      notifications: 'Notifications',
      whatsapp: 'WhatsApp',
      settings: 'Settings'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page.charAt(0).toUpperCase() + page.slice(1).replace('-', ' ');
    renderPage(page);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ============================================================
  // PAGE RENDERER
  // ============================================================
  function renderPage(page) {
    const content = document.getElementById('pageContent');
    content.style.opacity = '0';
    content.style.transform = 'translateY(8px)';
    content.style.transition = '0.2s ease';
    setTimeout(() => {
      switch (page) {
        case 'dashboard': renderDashboard(content); break;
        case 'catalog': renderCatalog(content); break;
        case 'places': renderPlaces(content); break;
        case 'customers': renderCustomers(content); break;
        case 'orders': renderOrders(content); break;
        case 'earnings': renderEarnings(content); break;
        case 'reports': renderReports(content); break;
        case 'bestselling': renderBestSelling(content); break;
        case 'offers': renderOffers(content); break;
        case 'notifications': renderNotifications(content); break;
        case 'whatsapp': renderWhatsApp(content); break;
        case 'settings': renderSettings(content); break;
        default: content.innerHTML = '<p class="text-gray-500 text-center py-8">Page not found</p>';
      }
      content.style.opacity = '1';
      content.style.transform = 'translateY(0)';
    }, 50);
  }

  // ============================================================
  // LOAD DATA
  // ============================================================
  async function loadAllData() {
    try {
      const [cats, rests, prods, plcs, custs, ords, offs, setts] = await Promise.all([
        fetchData('categories'),
        fetchData('restaurants'),
        fetchData('products'),
        fetchData('places'),
        fetchData('customers'),
        fetchData('orders'),
        fetchData('offers'),
        fetchData('settings')
      ]);
      categories = cats || [];
      restaurants = rests || [];
      products = prods || [];
      places = plcs || [];
      customers = custs || [];
      orders = ords || [];
      offers = offs || [];
      
      settings = {};
      settings.active_admin_phone = setts.active_admin_phone || '+919019825189';
      settings.admin_phones = setts.admin_phones || '["+919019825189","+91827079552","+919999999999"]';
      settings.default_commission = setts.default_commission || '10';
      settings.rain_fare = setts.rain_fare || '20';
      settings.rain_fare_enabled = setts.rain_fare_enabled || 'true';
      settings.delivery_hours = setts.delivery_hours || '9:00 AM - 10:00 PM';
      settings.unavailable_days = setts.unavailable_days || '["Monday"]';
      settings.service_unavailable = setts.service_unavailable || 'false';
      
    } catch (err) {
      console.error('Failed to load data:', err);
      showToast('Error loading data from server. Check backend.');
    }
  }

  // ============================================================
  // ADMIN LOGIN
  // ============================================================
  async function sendAdminOtp() {
    const phone = document.getElementById('adminPhone').value.trim();
    if (!phone || phone.length < 10) {
      showToast('Please enter a valid phone number');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/auth/admin/send-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
      document.getElementById('adminOtpSection').classList.remove('hidden');
      document.getElementById('adminSendOtpBtn').textContent = 'Resend OTP';
      showToast('OTP sent to your phone! (Check console for demo)');
    } catch (err) {
      showToast(err.message);
    }
  }

  async function verifyAdminOtp() {
    const phone = document.getElementById('adminPhone').value.trim();
    const otp = document.getElementById('adminOtp').value.trim();
    if (!otp) { showToast('Enter OTP'); return; }
    try {
      const res = await fetch(`${API_BASE}/auth/admin/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, otp })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Verification failed');
      localStorage.setItem('adminLoggedIn', 'true');
      localStorage.setItem('adminPhone', phone);
      document.getElementById('adminLoginOverlay').classList.add('hidden');
      showToast('Welcome Admin!');
      loadAllData().then(() => navigateTo('dashboard'));
    } catch (err) {
      showToast(err.message);
    }
  }

  // ============================================================
  // LOGOUT
  // ============================================================
  function logoutAdmin() {
    if (confirm('Are you sure you want to logout?')) {
      localStorage.removeItem('adminLoggedIn');
      localStorage.removeItem('adminPhone');
      location.reload();
    }
  }

  // ============================================================
  // DASHBOARD
  // ============================================================
  function renderDashboard(el) {
    const totalOrders = orders.length;
    const delivered = orders.filter(o => o.status === 'Delivered');
    const pending = orders.filter(o => o.status === 'Pending');
    const processing = orders.filter(o => o.status === 'Processing');
    const cancelled = orders.filter(o => o.status === 'Cancelled');
    const totalSales = delivered.reduce((sum, o) => sum + (o.grand_total || 0), 0);
    const totalCommission = delivered.reduce((sum, o) => sum + (o.commission_amount || 0), 0);
    const totalDelivery = delivered.reduce((sum, o) => sum + (o.delivery_charge || 0), 0);
    const totalRain = delivered.reduce((sum, o) => sum + (o.rain_fare || 0), 0);
    const totalProfit = totalCommission + totalDelivery + totalRain;
    const today = new Date().toDateString();
    const todayRevenue = delivered.filter(o => new Date(o.date).toDateString() === today).reduce((s, o) => s + (o.grand_total || 0), 0);
    const customersCount = customers.length;
    let bestProduct = { name: 'N/A', count: 0 };
    const productCounts = {};
    delivered.forEach(o => {
      (o.items || []).forEach(item => {
        productCounts[item.name] = (productCounts[item.name] || 0) + item.quantity;
      });
    });
    for (const [name, count] of Object.entries(productCounts)) {
      if (count > bestProduct.count) bestProduct = { name, count };
    }

    const stats = [
      { label: 'Total Orders', value: totalOrders, icon: 'fa-shopping-cart', color: 'blue' },
      { label: 'Total Sales', value: '₹' + totalSales.toFixed(2), icon: 'fa-rupee-sign', color: 'green' },
      { label: 'Commission', value: '₹' + totalCommission.toFixed(2), icon: 'fa-coins', color: 'yellow' },
      { label: 'Delivery', value: '₹' + totalDelivery.toFixed(2), icon: 'fa-truck', color: 'purple' },
      { label: 'Rain Fare', value: '₹' + totalRain.toFixed(2), icon: 'fa-cloud-rain', color: 'indigo' },
      { label: 'Profit', value: '₹' + totalProfit.toFixed(2), icon: 'fa-hand-holding-usd', color: 'pink' },
      { label: 'Pending', value: pending.length, icon: 'fa-clock', color: 'red' },
      { label: 'Delivered', value: delivered.length, icon: 'fa-check-circle', color: 'green' },
      { label: 'Customers', value: customersCount, icon: 'fa-users', color: 'teal' },
      { label: 'Best Seller', value: bestProduct.name, sub: bestProduct.count + ' orders', icon: 'fa-crown', color: 'emerald' },
      { label: "Today's Revenue", value: '₹' + todayRevenue.toFixed(2), icon: 'fa-calendar-day', color: 'amber' }
    ];

    const colorMap = {
      blue: 'bg-blue-100 text-blue-600',
      green: 'bg-green-100 text-green-600',
      yellow: 'bg-yellow-100 text-yellow-600',
      purple: 'bg-purple-100 text-purple-600',
      indigo: 'bg-indigo-100 text-indigo-600',
      red: 'bg-red-100 text-red-600',
      teal: 'bg-teal-100 text-teal-600',
      pink: 'bg-pink-100 text-pink-600',
      emerald: 'bg-emerald-100 text-emerald-600',
      amber: 'bg-amber-100 text-amber-600'
    };

    let statsHtml = stats.map(s => `
      <div class="stat-card">
        <div class="flex items-center gap-3">
          <div class="icon ${colorMap[s.color] || 'bg-gray-100 text-gray-600'}">
            <i class="fas ${s.icon}"></i>
          </div>
          <div class="min-w-0">
            <p class="stat-label">${s.label}</p>
            <p class="stat-value text-truncate">${s.value}</p>
            ${s.sub ? `<p class="text-xs text-gray-400">${s.sub}</p>` : ''}
          </div>
        </div>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="stat-grid mb-6">${statsHtml}</div>
      <div class="dashboard-charts">
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Daily Sales</h3><div class="chart-container"><canvas id="dailyChart"></canvas></div></div>
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Orders Overview</h3><div class="chart-container"><canvas id="ordersChart"></canvas></div></div>
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Revenue Breakdown</h3><div class="chart-container"><canvas id="profitChart"></canvas></div></div>
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Top Products</h3><div class="chart-container"><canvas id="bestSellingChart"></canvas></div></div>
      </div>
    `;

    setTimeout(() => {
      const days = [];
      const sales = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toLocaleDateString('en-IN', { weekday: 'short' }));
        const dailyTotal = orders.filter(o => new Date(o.date).toDateString() === d.toDateString() && o.status === 'Delivered')
          .reduce((s, o) => s + (o.grand_total || 0), 0);
        sales.push(dailyTotal);
      }
      new Chart(document.getElementById('dailyChart'), {
        type: 'bar',
        data: { labels: days, datasets: [{ label: 'Sales (₹)', data: sales, backgroundColor: '#007BFF', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      const statuses = ['Pending', 'Processing', 'Delivered', 'Cancelled'];
      const counts = statuses.map(s => orders.filter(o => o.status === s).length);
      new Chart(document.getElementById('ordersChart'), {
        type: 'doughnut',
        data: { labels: statuses, datasets: [{ data: counts, backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e', '#ef4444'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } } } }
      });

      const deliveredOrders = orders.filter(o => o.status === 'Delivered');
      const totalComm = deliveredOrders.reduce((s, o) => s + (o.commission_amount || 0), 0);
      const totalDeliv = deliveredOrders.reduce((s, o) => s + (o.delivery_charge || 0), 0);
      const totalRain = deliveredOrders.reduce((s, o) => s + (o.rain_fare || 0), 0);
      new Chart(document.getElementById('profitChart'), {
        type: 'bar',
        data: { labels: ['Commission', 'Delivery', 'Rain Fare'], datasets: [{ label: 'Amount (₹)', data: [totalComm, totalDeliv, totalRain], backgroundColor: ['#f59e0b', '#3b82f6', '#8b5cf6'], borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      const prodCounts = {};
      deliveredOrders.forEach(o => {
        (o.items || []).forEach(item => { prodCounts[item.name] = (prodCounts[item.name] || 0) + item.quantity; });
      });
      const sorted = Object.entries(prodCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      new Chart(document.getElementById('bestSellingChart'), {
        type: 'bar',
        data: { labels: sorted.map(s => s[0].length > 12 ? s[0].slice(0,12)+'…' : s[0]), datasets: [{ label: 'Sold', data: sorted.map(s => s[1]), backgroundColor: '#8b5cf6', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }, 150);
  }

  // ============================================================
  // CATALOG
  // ============================================================
  function renderCatalog(el) {
    el.innerHTML = `
      <div class="tab-group-scroll mb-4" id="catalogTabs">
        <button class="tab-btn ${catalogTab === 'categories' ? 'active' : ''}" onclick="switchCatalogTab('categories')">Categories</button>
        <button class="tab-btn ${catalogTab === 'restaurants' ? 'active' : ''}" onclick="switchCatalogTab('restaurants')">Restaurants</button>
        <button class="tab-btn ${catalogTab === 'products' ? 'active' : ''}" onclick="switchCatalogTab('products')">Products</button>
      </div>
      <div id="catalogTabContent"></div>
    `;
    renderCatalogTab(catalogTab);
  }

  function switchCatalogTab(tab) {
    catalogTab = tab;
    renderCatalog(document.getElementById('pageContent'));
  }

  function renderCatalogTab(tab) {
    const container = document.getElementById('catalogTabContent');
    if (!container) return;
    if (tab === 'categories') renderCategoriesList(container);
    else if (tab === 'restaurants') renderRestaurantsList(container);
    else if (tab === 'products') renderProductsList(container);
  }

  // ============================================================
  // CATEGORIES CRUD
  // ============================================================
  function renderCategoriesList(el) {
    el.innerHTML = `
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
        <h3 class="text-lg font-bold">Categories</h3>
        <button onclick="openAddCategory()" class="btn btn-primary btn-block sm:btn-auto"><i class="fas fa-plus"></i> Add Category</button>
      </div>
      <div class="card p-3 table-wrap">
        <table>
          <thead><tr><th>Image</th><th>Name</th><th class="hide-mobile">Restaurants</th><th>Actions</th></tr></thead>
          <tbody>
            ${(categories || []).map(c => {
              const count = (restaurants || []).filter(r => r.category === c.name).length;
              const img = c.image || 'https://placehold.co/60';
              return `<tr>
                <td data-label="Image"><img src="${img}" class="w-10 h-10 object-cover rounded" /></td>
                <td data-label="Name">${c.name}</td>
                <td class="hide-mobile" data-label="Restaurants">${count}</td>
                <td data-label="Actions">
                  <div class="table-actions">
                    <button class="btn btn-sm btn-primary" onclick="editCategory(${c.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteCategory(${c.id})"><i class="fas fa-trash"></i></button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function openAddCategory() {
    openModal(`
      <h2>Add Category</h2>
      <form id="categoryForm">
        <div class="form-group"><label>Category Name *</label><input id="catName" required placeholder="e.g. Beverages" /></div>
        <div class="form-group"><label>Category Image</label>
          <div class="file-input-wrapper">
            <div class="file-btn"><i class="fas fa-cloud-upload-alt"></i> Upload Image</div>
            <input id="catImage" type="file" accept="image/*" />
          </div>
          <div id="catImagePreview" class="image-preview-grid"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Save Category</button>
      </form>
    `);
    
    const fileInput = document.getElementById('catImage');
    const previewContainer = document.getElementById('catImagePreview');
    let imageDataUrl = null;

    fileInput.addEventListener('change', function() {
      previewContainer.innerHTML = '';
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imageDataUrl = e.target.result;
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = `<img src="${e.target.result}" /><button type="button" class="remove-img" onclick="this.parentElement.remove(); imageDataUrl = null;"><i class="fas fa-times"></i></button>`;
          previewContainer.appendChild(div);
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('categoryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('catName').value.trim();
      if (!name) { showToast('Name required'); return; }
      try {
        await postData('categories', { name, image: imageDataUrl });
        categories = await fetchData('categories');
        closeModal();
        showToast('Category added!');
        switchCatalogTab('categories');
      } catch (err) { showToast('Error: ' + err.message); }
    });
  }

  function editCategory(id) {
    const c = (categories || []).find(x => x.id === id);
    if (!c) return;
    openModal(`
      <h2>Edit Category</h2>
      <form id="categoryForm">
        <div class="form-group"><label>Category Name *</label><input id="catName" value="${c.name}" required /></div>
        <div class="form-group"><label>Current Image</label>
          ${c.image ? `<img src="${c.image}" class="w-20 h-20 object-cover rounded" />` : '<p class="text-gray-400">No image</p>'}
        </div>
        <div class="form-group"><label>Upload New Image (optional)</label>
          <div class="file-input-wrapper">
            <div class="file-btn"><i class="fas fa-cloud-upload-alt"></i> Upload New Image</div>
            <input id="catImage" type="file" accept="image/*" />
          </div>
          <div id="catImagePreview" class="image-preview-grid"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Update</button>
      </form>
    `);
    
    const fileInput = document.getElementById('catImage');
    const previewContainer = document.getElementById('catImagePreview');
    let imageDataUrl = null;

    fileInput.addEventListener('change', function() {
      previewContainer.innerHTML = '';
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          imageDataUrl = e.target.result;
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = `<img src="${e.target.result}" /><button type="button" class="remove-img" onclick="this.parentElement.remove(); imageDataUrl = null;"><i class="fas fa-times"></i></button>`;
          previewContainer.appendChild(div);
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('categoryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('catName').value.trim();
      const image = imageDataUrl || c.image;
      try {
        await putData(`categories/${id}`, { name, image });
        categories = await fetchData('categories');
        closeModal();
        showToast('Category updated!');
        switchCatalogTab('categories');
      } catch (err) { showToast('Error: ' + err.message); }
    });
  }

  function deleteCategory(id) {
    if (!confirm('Delete this category?')) return;
    deleteData(`categories/${id}`).then(() => fetchData('categories')).then(data => {
      categories = data;
      showToast('Category deleted');
      switchCatalogTab('categories');
    }).catch(err => showToast('Error: ' + err.message));
  }

  // ============================================================
  // RESTAURANTS CRUD
  // ============================================================
  function renderRestaurantsList(el) {
    el.innerHTML = `
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
        <h3 class="text-lg font-bold">Restaurants</h3>
        <button onclick="openAddRestaurant()" class="btn btn-primary btn-block sm:btn-auto"><i class="fas fa-plus"></i> Add Restaurant</button>
      </div>
      <div class="card p-3 table-wrap">
        <table>
          <thead><tr><th>Name</th><th class="hide-mobile">Category</th><th>Logo</th><th>Status</th><th>Toggle</th><th>Actions</th></tr></thead>

  async function sendWhatsAppMessage() {
    const phone = document.getElementById('whatsappPhone').value.trim();
    const message = document.getElementById('whatsappMessage').value.trim();
    if (!phone || !message) { showToast('Please enter both phone and message'); return; }
    try {
      const res = await fetch(`${API_BASE}/whatsapp/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, message })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send');
      showToast('WhatsApp message sent!');
    } catch (err) { showToast('Error: ' + err.message); }
  }

      <h2 class="text-xl font-bold mb-4">⚙️ Settings</h2>
      <div class="space-y-6">
        <!-- Service Status -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">🔌 Service Status</h3>
          <div class="flex items-center gap-4">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="serviceToggle" class="sr-only peer" ${serviceUnavailable ? 'checked' : ''} onchange="toggleServiceStatus(this.checked)">
              <div class="w-14 h-7 bg-gray-200 peer-focus:ring-2 peer-focus:ring-primary rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-red-600"></div>
            </label>
            <span id="serviceStatusLabel" class="font-medium text-lg ${serviceUnavailable ? 'text-red-600' : 'text-green-600'}">
              ${serviceUnavailable ? '🔴 Service Unavailable' : '🟢 Service Active'}
            </span>
          </div>
        </div>

        <!-- Rain Fare Toggle -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">🌧️ Rain Fare</h3>
          <div class="flex items-center gap-4">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="rainFareToggle" class="sr-only peer" ${rainFareEnabled ? 'checked' : ''} onchange="toggleRainFare(this.checked)">
              <div class="w-14 h-7 bg-gray-200 peer-focus:ring-2 peer-focus:ring-primary rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
            </label>
            <span id="rainFareStatus" class="font-medium text-lg ${rainFareEnabled ? 'text-green-600' : 'text-gray-500'}">
              ${rainFareEnabled ? '✅ Rain Fare Enabled' : '❌ Rain Fare Disabled'}
            </span>
          </div>
          <div class="mt-3 flex gap-2">
            <input type="number" id="rainFare" value="${settings.rain_fare || 20}" class="flex-1 border rounded-lg px-4 py-2" step="0.01" />
            <button onclick="updateRainFare()" class="btn btn-primary">Update Amount</button>
          </div>
          <p class="text-sm text-gray-500 mt-2">Rain fare will ${rainFareEnabled ? 'be applied' : 'not be applied'} to orders</p>
        </div>

        <!-- Admin Phone Numbers -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">📱 Admin Phone Numbers</h3>
          <p class="text-sm text-gray-500 mb-3">These numbers can receive admin OTPs</p>
          <div id="adminPhonesList" class="space-y-2 mb-3">
            ${adminPhones.map((phone, index) => `
              <div class="flex items-center gap-2">
                <input type="tel" value="${phone}" class="flex-1 px-3 py-2 rounded-lg border border-gray-300 bg-gray-50 text-sm" onchange="updateAdminPhone(${index}, this.value)" />
                <button onclick="removeAdminPhone(${index})" class="text-red-500 hover:text-red-700 px-2 py-2"><i class="fas fa-trash"></i></button>
              </div>
            `).join('')}
          </div>
          <button onclick="addAdminPhone()" class="btn btn-sm btn-outline mb-4"><i class="fas fa-plus"></i> Add Phone Number</button>
          <button onclick="saveAdminPhones()" class="btn btn-primary"><i class="fas fa-save"></i> Save Phone Numbers</button>
          <p id="adminPhoneStatus" class="text-sm mt-2 text-gray-500"></p>
        </div>

        <!-- Active Admin Phone -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">🔑 Active Admin Phone (Login)</h3>
          <div class="flex gap-2">
            <select id="adminPhoneSelect" class="flex-1 border rounded-lg px-4 py-2 bg-white dark:bg-gray-700">
              ${adminPhones.map(p => `<option value="${p}" ${settings.active_admin_phone === p ? 'selected' : ''}>${p}</option>`).join('')}
            </select>
            <button onclick="updateActiveAdminPhone()" class="btn btn-primary">Update</button>
          </div>
          <p id="activePhoneStatus" class="text-sm mt-2 text-gray-500"></p>
        </div>

        <!-- Commission Rate -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">💰 Commission Rate</h3>
          <div class="flex gap-2">
            <input type="number" id="commissionRate" value="${settings.default_commission || 10}" class="flex-1 border rounded-lg px-4 py-2" step="0.01" />
            <button onclick="updateSetting('default_commission', document.getElementById('commissionRate').value)" class="btn btn-primary">Save</button>
          </div>
          <p class="text-sm text-gray-500 mt-1">Accepts decimal values (e.g., 10.5)</p>
        </div>

        <!-- Delivery Hours -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">🕐 Delivery Hours</h3>
          <div class="flex gap-2">
            <input type="text" id="deliveryHours" value="${settings.delivery_hours || '9:00 AM - 10:00 PM'}" class="flex-1 border rounded-lg px-4 py-2" />
            <button onclick="updateSetting('delivery_hours', document.getElementById('deliveryHours').value)" class="btn btn-primary">Save</button>
          </div>
        </div>

        <!-- Unavailable Days -->
        <div class="card p-6">
          <h3 class="font-semibold text-lg mb-3">📅 Unavailable Days</h3>
          <p class="text-sm text-gray-500 mb-3">Days when delivery is not available</p>
          <div class="flex gap-2 flex-wrap">
            ${['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].map(day => {
              const isChecked = unavailableDays.includes(day);
              return `
                <label class="inline-flex items-center gap-2 cursor-pointer px-3 py-2 rounded-lg border ${isChecked ? 'border-red-500 bg-red-50' : 'border-gray-300 hover:border-primary'}">
                  <input type="checkbox" class="unavailable-day" value="${day}" ${isChecked ? 'checked' : ''} onchange="updateUnavailableDays()" />
                  <span class="text-sm">${day}</span>
                </label>
              `;
            }).join('')}
          </div>
          <button onclick="saveUnavailableDays()" class="btn btn-primary mt-4">Save Unavailable Days</button>
        </div>
      </div>
    `;
  }

  // ============================================================
  // SETTINGS HELPER FUNCTIONS
  // ============================================================
  function toggleServiceStatus(isChecked) {
    const status = isChecked ? 'true' : 'false';
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'service_unavailable', value: status })
    })
    .then(res => res.json())
    .then(() => {
      settings.service_unavailable = status;
      const label = document.getElementById('serviceStatusLabel');
      if (label) {
        label.textContent = isChecked ? '🔴 Service Unavailable' : '🟢 Service Active';
        label.className = `font-medium text-lg ${isChecked ? 'text-red-600' : 'text-green-600'}`;
      }
      showToast(isChecked ? 'Service marked as unavailable' : 'Service is now active');
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  function toggleRainFare(isChecked) {
    const status = isChecked ? 'true' : 'false';
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'rain_fare_enabled', value: status })
    })
    .then(res => res.json())
    .then(() => {
      settings.rain_fare_enabled = status;
      const label = document.getElementById('rainFareStatus');
      if (label) {
        label.textContent = isChecked ? '✅ Rain Fare Enabled' : '❌ Rain Fare Disabled';
        label.className = `font-medium text-lg ${isChecked ? 'text-green-600' : 'text-gray-500'}`;
      }
      showToast(isChecked ? 'Rain fare enabled' : 'Rain fare disabled');
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  function updateRainFare() {
    const value = document.getElementById('rainFare').value;
    if (!value || isNaN(value)) {
      showToast('Please enter a valid amount');
      return;
    }
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'rain_fare', value: value })
    })
    .then(res => res.json())
    .then(() => {
      settings.rain_fare = value;
      showToast('Rain fare updated to ₹' + value);
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  // Admin Phone Functions
  function addAdminPhone() {
    const container = document.getElementById('adminPhonesList');
    const index = adminPhonesList.length;
    const div = document.createElement('div');
    div.className = 'flex items-center gap-2';
    div.innerHTML = `
      <input type="tel" placeholder="+91XXXXXXXXXX" class="flex-1 px-3 py-2 rounded-lg border border-gray-300 text-sm" onchange="updateAdminPhone(${index}, this.value)" />
      <button onclick="removeAdminPhone(${index})" class="text-red-500 hover:text-red-700 px-2 py-2"><i class="fas fa-trash"></i></button>
    `;
    container.appendChild(div);
    adminPhonesList.push('');
  }

  function updateAdminPhone(index, value) {
    adminPhonesList[index] = value.trim();
  }

  function removeAdminPhone(index) {
    if (!confirm('Remove this phone number?')) return;
    adminPhonesList.splice(index, 1);
    renderSettings(document.getElementById('pageContent'));
  }

  function saveAdminPhones() {
    const validPhones = adminPhonesList.filter(p => p && p.length >= 10);
    if (validPhones.length === 0) {
      showToast('At least one valid phone number is required');
      return;
    }
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'admin_phones', value: JSON.stringify(validPhones) })
    })
    .then(res => res.json())
    .then(() => {
      settings.admin_phones = JSON.stringify(validPhones);
      document.getElementById('adminPhoneStatus').textContent = '✅ Phone numbers saved!';
      setTimeout(() => document.getElementById('adminPhoneStatus').textContent = '', 3000);
      showToast('Admin phones updated');
      const select = document.getElementById('adminPhoneSelect');
      if (select) {
        select.innerHTML = validPhones.map(p => `<option value="${p}">${p}</option>`).join('');
      }
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  function updateActiveAdminPhone() {
    const phone = document.getElementById('adminPhoneSelect').value;
    if (!phone) { showToast('Please select a phone number'); return; }
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'active_admin_phone', value: phone })
    })
    .then(res => res.json())
    .then(() => {
      settings.active_admin_phone = phone;
      document.getElementById('activePhoneStatus').textContent = '✅ Active admin phone updated!';
      setTimeout(() => document.getElementById('activePhoneStatus').textContent = '', 3000);
      showToast('Active admin phone updated to ' + phone);
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  function updateSetting(key, value) {
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value })
    })
    .then(res => res.json())
    .then(() => {
      showToast('Setting updated successfully');
      renderSettings(document.getElementById('pageContent'));
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  function updateUnavailableDays() {}

  function saveUnavailableDays() {
    const checkboxes = document.querySelectorAll('.unavailable-day:checked');
    const days = Array.from(checkboxes).map(cb => cb.value);
    fetch(`${API_BASE}/settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: 'unavailable_days', value: JSON.stringify(days) })
    })
    .then(res => res.json())
    .then(() => {
      settings.unavailable_days = JSON.stringify(days);
      showToast('Unavailable days saved');
    })
    .catch(err => showToast('Error: ' + err.message));
  }

  // ============================================================
  // REPORTS
  // ============================================================
  function renderReports(el) {
    el.innerHTML = `
      <h2 class="text-xl font-bold mb-4">Reports</h2>
      <div class="flex flex-wrap gap-2 mb-4">
        <button class="tab-btn active" onclick="showCommissionReport('daily')">Daily Commission</button>
        <button class="tab-btn" onclick="showCommissionReport('weekly')">Weekly Commission</button>
        <button class="tab-btn" onclick="showCommissionReport('monthly')">Monthly Commission</button>
        <button class="tab-btn" onclick="showRestaurantReport()">Restaurant Report</button>
        <button class="tab-btn" onclick="showCategoryCommission()">Category Commission</button>
      </div>
      <div id="reportContent"></div>
    `;
    showCommissionReport('daily');
  }

  async function showCommissionReport(period) {
    const container = document.getElementById('reportContent');
    container.innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;
    try {
      const data = await fetchData(`reports/commission?period=${period}`);
      let html = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="stat-card"><p class="stat-label">Total Commission</p><p class="stat-value">₹${data.totalCommission.toFixed(2)}</p></div>
          <div class="stat-card"><p class="stat-label">Total Sales</p><p class="stat-value">₹${data.totalSales.toFixed(2)}</p></div>
          <div class="stat-card"><p class="stat-label">Total Orders</p><p class="stat-value">${data.totalOrders}</p></div>
        </div>
        <div class="card p-4 mb-4">
          <h3 class="font-semibold mb-2">Commission Trend (${period})</h3>
          <div class="chart-container"><canvas id="commissionChart"></canvas></div>
        </div>
        <div class="card p-4 table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Orders</th><th>Sales</th><th>Commission</th></tr></thead>
            <tbody>
              ${data.labels.map((label, i) => `
                <tr>
                  <td>${label}</td>
                  <td>${data.orderCounts[i]}</td>
                  <td>₹${data.salesData[i].toFixed(2)}</td>
                  <td>₹${data.commissionData[i].toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
      container.innerHTML = html;
      new Chart(document.getElementById('commissionChart'), {
        type: 'bar',
        data: {
          labels: data.labels,
          datasets: [
            { label: 'Commission (₹)', data: data.commissionData, backgroundColor: '#007BFF', borderRadius: 4 },
            { label: 'Sales (₹)', data: data.salesData, backgroundColor: '#22c55e', borderRadius: 4 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
      });
    } catch (err) {
      container.innerHTML = `<p class="text-red-500">Error loading report: ${err.message}</p>`;
    }
  }

  async function showRestaurantReport() {
    const container = document.getElementById('reportContent');
    const foodRestaurants = (restaurants || []).filter(r => r.category === 'Food');
    if (foodRestaurants.length === 0) {
      container.innerHTML = `<p class="text-gray-500">No restaurants in Food category.</p>`;
      return;
    }
    let options = foodRestaurants.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    container.innerHTML = `
      <div class="card p-4 mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Select Restaurant</label>
        <select id="restaurantSelect" class="w-full border rounded-lg px-3 py-2 text-sm" onchange="loadRestaurantReport()">
          <option value="">-- Select --</option>
          ${options}
        </select>
      </div>
      <div id="restaurantReportDetails"></div>
    `;
    if (foodRestaurants.length > 0) {
      document.getElementById('restaurantSelect').value = foodRestaurants[0].id;
      loadRestaurantReport();
    }
  }

  async function loadRestaurantReport() {
    const select = document.getElementById('restaurantSelect');
    const id = select.value;
    if (!id) { document.getElementById('restaurantReportDetails').innerHTML = ''; return; }
    const container = document.getElementById('restaurantReportDetails');
    container.innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;
    try {
      const data = await fetchData(`reports/restaurant/${id}`);
      let html = `
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
          <div class="stat-card"><p class="stat-label">Total Orders</p><p class="stat-value">${data.totalOrders}</p></div>
          <div class="stat-card"><p class="stat-label">Total Revenue</p><p class="stat-value">₹${data.totalRevenue.toFixed(2)}</p></div>
          <div class="stat-card"><p class="stat-label">Commission</p><p class="stat-value">₹${data.totalCommission.toFixed(2)}</p></div>
          <div class="stat-card"><p class="stat-label">Restaurant Earnings</p><p class="stat-value">₹${data.restaurantRevenue.toFixed(2)}</p></div>
        </div>
        <div class="card p-3 table-wrap">
          <table>
            <thead><tr><th>Order ID</th><th>Date</th><th>Grand Total</th><th>Commission</th><th>Restaurant Revenue</th></tr></thead>
            <tbody>
              ${data.orders.map(o => `
                <tr>
                  <td>${o.orderId}</td>
                  <td>${new Date(o.date).toLocaleDateString()}</td>
                  <td>₹${o.grandTotal}</td>
                  <td>₹${o.commission}</td>
                  <td>₹${o.restaurantRevenue}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = `<p class="text-red-500">Error loading restaurant report: ${err.message}</p>`;
    }
  }

  // ---- Category Commission Report ----
  async function showCategoryCommission() {
    const container = document.getElementById('reportContent');
    container.innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;

    try {
      const data = await fetchData('reports/category-commission');
      
      let html = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div class="stat-card">
            <p class="stat-label">Total Orders</p>
            <p class="stat-value">${data.totalOrders}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Total Revenue</p>
            <p class="stat-value">₹${data.totalRevenue.toFixed(2)}</p>
          </div>
          <div class="stat-card">
            <p class="stat-label">Total Commission</p>
            <p class="stat-value">₹${data.totalCommission.toFixed(2)}</p>
          </div>
        </div>
        
        <div class="card p-4 mb-4">
          <h3 class="font-semibold mb-2">Category-wise Commission Breakdown</h3>
          <div class="chart-container"><canvas id="categoryCommissionChart"></canvas></div>
        </div>
        
        <div class="card p-4 table-wrap">
          <table>
            <thead><tr><th>Category</th><th>Commission (₹)</th><th>Percentage</th></tr></thead>
            <tbody>
              ${data.labels.map((cat, i) => `
                <tr>
                  <td>${cat}</td>
                  <td>₹${data.data[i].toFixed(2)}</td>
                  <td>${data.totalCommission > 0 ? ((data.data[i] / data.totalCommission) * 100).toFixed(1) : 0}%</td>
                </tr>
              `).join('')}
              <tr class="font-bold">
                <td>Total</td>
                <td>₹${data.totalCommission.toFixed(2)}</td>
                <td>100%</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
      container.innerHTML = html;

      new Chart(document.getElementById('categoryCommissionChart'), {
        type: 'doughnut',
        data: {
          labels: data.labels,
          datasets: [{
            data: data.data,
            backgroundColor: ['#007BFF', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6']
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } }
          }
        }
      });
    } catch (err) {
      container.innerHTML = `<p class="text-red-500">Error loading category commission: ${err.message}</p>`;
    }
  }

  // ============================================================
  // EXPOSE ALL FUNCTIONS TO GLOBAL SCOPE
  // ============================================================
  window.navigateTo = navigateTo;
  window.switchCatalogTab = switchCatalogTab;
  window.openAddCategory = openAddCategory;
  window.editCategory = editCategory;
  window.deleteCategory = deleteCategory;
  window.openAddRestaurant = openAddRestaurant;
  window.editRestaurant = editRestaurant;
  window.deleteRestaurant = deleteRestaurant;
  window.openAddProduct = openAddProduct;
  window.editProduct = editProduct;
  window.deleteProduct = deleteProduct;
  window.addVariantRow = addVariantRow;
  window.removeExistingImage = removeExistingImage;
  window.openAddPlace = openAddPlace;
  window.editPlace = editPlace;
  window.deletePlace = deletePlace;
  window.toggleBlockCustomer = toggleBlockCustomer;
  window.viewOrder = viewOrder;
  window.updateOrderStatus = updateOrderStatus;
  window.openAddOffer = openAddOffer;
  window.editOffer = editOffer;
  window.deleteOffer = deleteOffer;
  window.sendTestNotification = sendTestNotification;
  window.sendWhatsAppMessage = sendWhatsAppMessage;
  window.viewWhatsAppLogs = viewWhatsAppLogs;
  window.toggleSidebar = toggleSidebar;
  window.closeSidebar = closeSidebar;
  window.closeModal = closeModal;
  window.showToast = showToast;
  window.sendAdminOtp = sendAdminOtp;
  window.verifyAdminOtp = verifyAdminOtp;
  window.updateSetting = updateSetting;
  window.toggleRestaurantStatus = toggleRestaurantStatus;
  window.showCommissionReport = showCommissionReport;
  window.showRestaurantReport = showRestaurantReport;
  window.loadRestaurantReport = loadRestaurantReport;
  window.logoutAdmin = logoutAdmin;
  window.toggleServiceStatus = toggleServiceStatus;
  window.toggleRainFare = toggleRainFare;
  window.updateRainFare = updateRainFare;
  window.addAdminPhone = addAdminPhone;
  window.updateAdminPhone = updateAdminPhone;
  window.removeAdminPhone = removeAdminPhone;
  window.saveAdminPhones = saveAdminPhones;
  window.updateActiveAdminPhone = updateActiveAdminPhone;
  window.updateUnavailableDays = updateUnavailableDays;
  window.saveUnavailableDays = saveUnavailableDays;
  window.showCategoryCommission = showCategoryCommission;

  // ============================================================
  // INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    const savedPhone = localStorage.getItem('adminPhone');
    if (savedPhone) {
      document.getElementById('adminPhone').value = savedPhone;
    }
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      document.getElementById('adminLoginOverlay').classList.add('hidden');
      loadAllData().then(() => navigateTo('dashboard'));
    } else {
      document.getElementById('adminLoginOverlay').classList.remove('hidden');
    }
  });
</script>
