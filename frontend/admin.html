<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>CaptaDelivery Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#007BFF', primaryDark: '#0056b3' } } }
    };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ===== CUSTOM STYLES ===== */
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #f3f4f6; overflow-x: hidden; }

    .sidebar {
      background: #1e293b;
      min-height: 100vh;
      width: 280px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      position: fixed;
      top:0; left:0;
      z-index:40;
      overflow-y:auto;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar a {
      display: flex; align-items: center;
      padding: 12px 20px;
      color: #cbd5e1;
      transition: 0.2s;
      border-left: 3px solid transparent;
      font-size: 0.95rem;
      gap: 12px;
      border-radius: 0 8px 8px 0;
      margin: 2px 8px 2px 0;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #334155;
      color: white;
      border-left-color: #007BFF;
    }
    .sidebar a i { width: 22px; text-align: center; font-size: 1.1rem; flex-shrink:0; }
    .sidebar a span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-brand {
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .sidebar-brand i { color: #007BFF; }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index:39;
      backdrop-filter: blur(4px);
    }
    .sidebar-backdrop.active { display: block; }

    .main-content {
      margin-left: 0;
      padding: 16px;
      min-height: 100vh;
      transition: margin 0.3s ease;
      padding-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      flex-wrap: wrap;
    }
    .top-bar .page-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar .page-title .menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: white;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      color: #1e293b;
      font-size: 1.2rem;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .top-bar .page-title .menu-btn:hover { background: #f1f5f9; }
    .top-bar .page-title h1 { font-size: 1.25rem; font-weight: 700; }
    .top-bar .right-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar .right-actions .theme-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: white;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      color: #64748b;
      font-size: 1.1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-bar .right-actions .theme-btn:hover { background: #f1f5f9; }
    .top-bar .right-actions .admin-badge {
      background: #e2e8f0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #475569;
      display: none;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: 0.2s;
      overflow: hidden;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .stat-card {
      padding: 16px;
      border-radius: 14px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: 0.2s;
    }
    .stat-card:active { transform: scale(0.97); }
    .stat-card .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink:0;
      font-size: 1.1rem;
    }
    .stat-card .stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
    }
    @media (min-width:480px) { .stat-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width:768px) { .stat-grid { grid-template-columns: repeat(4,1fr); } }
    @media (min-width:1024px) { .stat-grid { grid-template-columns: repeat(6,1fr); } }

    .tab-btn {
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      font-size: 0.85rem;
      border: none;
      background: transparent;
      color: #64748b;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: #007BFF;
      color: white;
      box-shadow: 0 4px 12px rgba(0,123,255,0.25);
    }
    .tab-btn:hover:not(.active) { background: #e2e8f0; }

    .tab-group-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-group-scroll::-webkit-scrollbar { display: none; }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -4px;
      padding: 0 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 600px;
    }
    th {
      background: #f8fafc;
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e9edf2;
      vertical-align: middle;
    }
    tr:hover td { background: #f8fafc; }

    .table-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .table-actions .btn { padding: 4px 10px; font-size: 0.75rem; border-radius: 8px; }

    .badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .badge-secondary { background: #e5e7eb; color: #374151; }

    .btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      touch-action: manipulation;
      user-select: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #007BFF; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }
    .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
    .btn-outline:hover { background: #f3f4f6; }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }

    .modal-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index:999;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      max-height: 90vh;
      overflow-y: auto;
      width: 100%;
      max-width: 560px;
      padding: 20px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      margin: 12px;
    }
    .modal-box .modal-close {
      position: sticky;
      top:0;
      float:right;
      background:none;
      border:none;
      font-size:1.5rem;
      color:#94a3b8;
      cursor:pointer;
      padding:4px 8px;
      z-index:10;
    }
    .modal-box .modal-close:hover { color:#1e293b; }
    .modal-box h2 { font-size:1.3rem; font-weight:700; margin-bottom:16px; padding-right:40px; }

    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-weight:500; font-size:0.85rem; margin-bottom:4px; color:#374151; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%;
      padding:10px 14px;
      border:1px solid #d1d5db;
      border-radius:10px;
      outline:none;
      transition:0.2s;
      font-size:0.95rem;
      background:white;
      -webkit-appearance:none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#007BFF;
      box-shadow:0 0 0 3px rgba(0,123,255,0.15);
    }
    .form-group textarea { resize:vertical; min-height:60px; }

    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .image-preview-grid .preview-item {
      position: relative;
      width: 68px; height: 68px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #e5e7eb;
      flex-shrink:0;
    }
    .image-preview-grid .preview-item img { width:100%; height:100%; object-fit:cover; }
    .image-preview-grid .preview-item .remove-img {
      position: absolute;
      top: -6px; right: -6px;
      width: 20px; height: 20px;
      background: #ef4444;
      color: white;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      border: 2px solid white;
      transition: 0.2s;
      touch-action: manipulation;
    }
    .image-preview-grid .preview-item .remove-img:active { transform: scale(0.85); }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      left:0; top:0;
      opacity:0;
      width:100%; height:100%;
      cursor:pointer;
    }
    .file-input-wrapper .file-btn {
      width:100%;
      padding:12px;
      border:2px dashed #d1d5db;
      border-radius:12px;
      background:#f8fafc;
      color:#64748b;
      font-size:0.9rem;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:0.2s;
      cursor:pointer;
    }
    .file-input-wrapper .file-btn:hover { border-color:#007BFF; background:#eff6ff; }
    .file-input-wrapper .file-btn:active { transform:scale(0.98); }

    #notificationContainer {
      position: fixed;
      top: 12px;
      right: 12px;
      left: 12px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    #notificationContainer .toast {
      pointer-events: auto;
      background: #1e293b;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }
    #notificationContainer .toast i { color:#22c55e; font-size:1.1rem; flex-shrink:0; }
    @keyframes slideIn {
      from { transform:translateX(100%); opacity:0; }
      to { transform:translateX(0); opacity:1; }
    }

    /* No bottom nav in admin */

    .hide-mobile { display: none !important; }
    @media (min-width:768px) {
      .hide-mobile { display: inline-flex !important; }
      .show-mobile { display: none !important; }
    }
    .show-mobile { display: inline-flex !important; }

    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }

    .gap-1 { gap:4px; } .gap-2 { gap:8px; } .gap-3 { gap:12px; }
    .flex-wrap { flex-wrap:wrap; } .items-center { align-items:center; } .justify-between { justify-content:space-between; }
    .text-truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
    @media (min-width:480px) { .text-truncate { max-width:200px; } }

    .fade-in { animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .chart-container { position:relative; height:200px; width:100%; }
    @media (max-width:480px) { .chart-container { height:160px; } }
    .dashboard-charts { display:grid; grid-template-columns:1fr; gap:16px; }
    @media (min-width:768px) { .dashboard-charts { grid-template-columns:1fr 1fr; } }

    /* Desktop overrides */
    @media (min-width:768px) {
      .sidebar {
        transform: none !important;
        position: fixed;
        left:0; top:0;
        width:280px;
        display: block !important;
        z-index:30;
      }
      .sidebar-backdrop { display: none !important; }
      .main-content { margin-left:280px; padding:24px 32px; }
      .top-bar .page-title .menu-btn { display: none !important; }
      .top-bar .right-actions .admin-badge { display: inline-flex !important; }
      .hide-mobile { display: table-cell !important; }
    }

    .offer-preview { padding:8px 12px; border-radius:8px; display:inline-flex; align-items:center; gap:8px; color:white; font-size:0.8rem; }

    /* Dark mode */
    .dark .card { background:#1e293b; color:#e2e8f0; }
    .dark .stat-card { background:#1e293b; color:#e2e8f0; }
    .dark .table-wrap table th { background:#1e293b; color:#94a3b8; }
    .dark .table-wrap table td { border-bottom-color:#334155; }
    .dark .table-wrap tr:hover td { background:#2d3a4f; }
    .dark .form-group input, .dark .form-group select { background:#0f172a; border-color:#334155; color:#e2e8f0; }
    .dark .form-group input:focus, .dark .form-group select:focus { border-color:#007BFF; box-shadow:0 0 0 3px rgba(0,123,255,0.2); }
    .dark .modal-box { background:#1e293b; color:#e2e8f0; }
    .dark .modal-box .modal-close { color:#94a3b8; }
    .dark .modal-box .modal-close:hover { color:#e2e8f0; }
    .dark .tab-btn:hover:not(.active) { background:#334155; }
    .dark .tab-btn:not(.active) { color:#94a3b8; }
    .dark .badge-secondary { background:#334155; color:#94a3b8; }
    .dark .top-bar .page-title { color:#e2e8f0; }
    .dark .top-bar .page-title .menu-btn { background:#1e293b; color:#e2e8f0; border:1px solid #334155; }
    .dark .top-bar .right-actions .theme-btn { background:#1e293b; color:#e2e8f0; border:1px solid #334155; }
    .dark .top-bar .right-actions .admin-badge { background:#334155; color:#94a3b8; }
    .dark .file-input-wrapper .file-btn { background:#0f172a; border-color:#334155; color:#94a3b8; }
    .dark .file-input-wrapper .file-btn:hover { border-color:#007BFF; background:#1a2a4a; }
    .dark #notificationContainer .toast { background:#1e293b; border:1px solid #334155; }
  </style>
</head>
<body>

<!-- ========== ADMIN LOGIN OVERLAY ========== -->
<div id="adminLoginOverlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-900/80 backdrop-blur-sm hidden">
  <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md w-full shadow-2xl">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800 dark:text-white">Admin Login</h2>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Phone</label>
        <input type="tel" id="adminPhone" placeholder="Enter admin phone" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" />
      </div>
      <div id="adminOtpSection" class="hidden">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">OTP</label>
        <div class="flex gap-2">
          <input type="text" id="adminOtp" placeholder="Enter OTP" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" />
          <button onclick="verifyAdminOtp()" class="gradient-btn text-white px-6 py-3 rounded-xl font-semibold">Verify</button>
        </div>
      </div>
      <button onclick="sendAdminOtp()" id="adminSendOtpBtn" class="gradient-btn w-full text-white py-3 rounded-xl font-semibold">Send OTP</button>
    </div>
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">OTP will be sent to your phone</p>
  </div>
</div>

<!-- ========== SIDEBAR BACKDROP ========== -->
<div id="sidebarBackdrop" class="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- ========== SIDEBAR ========== -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-brand">
    <i class="fas fa-store"></i>
    <span>CaptaDelivery</span>
  </div>
  <nav class="mt-2" id="sidebarNav">
    <a href="#" data-page="dashboard" class="active"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
    <a href="#" data-page="catalog"><i class="fas fa-boxes"></i><span>Catalog</span></a>
    <a href="#" data-page="places"><i class="fas fa-map-pin"></i><span>Delivery Places</span></a>
    <a href="#" data-page="customers"><i class="fas fa-users"></i><span>Customers</span></a>
    <a href="#" data-page="orders"><i class="fas fa-truck"></i><span>Orders</span></a>
    <a href="#" data-page="earnings"><i class="fas fa-coins"></i><span>Earnings</span></a>
    <a href="#" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
    <a href="#" data-page="bestselling"><i class="fas fa-crown"></i><span>Best Selling</span></a>
    <a href="#" data-page="offers"><i class="fas fa-tags"></i><span>Offers</span></a>
    <a href="#" data-page="notifications"><i class="fas fa-bell"></i><span>Notifications</span></a>
    <a href="#" data-page="whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
    <a href="#" data-page="settings"><i class="fas fa-cog"></i><span>Settings</span></a>
  </nav>
  <div class="absolute bottom-4 left-0 w-full px-4">
    <a href="index.html" class="text-gray-400 hover:text-white block px-4 py-2 flex items-center gap-3">
      <i class="fas fa-sign-out-alt"></i> <span>Back to Store</span>
    </a>
  </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div id="mainContent" class="main-content">

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <div class="page-title">
      <button class="menu-btn show-mobile" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1 id="pageTitle">Dashboard</h1>
    </div>
    <div class="right-actions">
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <span class="admin-badge"><i class="fas fa-user-shield mr-1"></i> Admin</span>
    </div>
  </div>

  <!-- ===== PAGE CONTENT ===== -->
  <div id="pageContent" class="fade-in"></div>
</div>

<!-- ========== MODAL CONTAINER ========== -->
<div id="modalContainer" class="fixed inset-0 hidden modal-overlay" style="display:none;">
  <div class="modal-box">
    <button id="closeModal" class="modal-close"><i class="fas fa-times"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ========== TOAST CONTAINER ========== -->
<div id="notificationContainer"></div>

<!-- ========== NO BOTTOM NAV ========== -->

<script>
  // ============================================================
  // API BASE
  // ============================================================
  const API_BASE = 'http://localhost:5000/api';

  // ============================================================
  // DATA HELPERS
  // ============================================================
  async function fetchData(endpoint) {
    const res = await fetch(`${API_BASE}/${endpoint}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }
  async function postData(endpoint, data) {
    const res = await fetch(`${API_BASE}/${endpoint}`, {
      method: 'POST',

  const ADMIN_PHONE = '+919019825189'; // Must match the one in .env

  async function sendAdminOtp() {
    const phone = document.getElementById('adminPhone').value.trim();
    if (phone !== ADMIN_PHONE) {
      showToast('Invalid admin phone');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/auth/admin/send-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
      document.getElementById('adminOtpSection').classList.remove('hidden');
      document.getElementById('adminSendOtpBtn').textContent = 'Resend OTP';
      showToast('OTP sent to your phone! (Check console for demo)');
    } catch (err) {
      showToast(err.message);
    }

  async function verifyAdminOtp() {
    const phone = document.getElementById('adminPhone').value.trim();
    const otp = document.getElementById('adminOtp').value.trim();
    if (!otp) { showToast('Enter OTP'); return; }
    try {
      const res = await fetch(`${API_BASE}/auth/admin/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, otp })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Verification failed');
      document.getElementById('adminLoginOverlay').classList.add('hidden');
      localStorage.setItem('adminLoggedIn', 'true');
      showToast('Welcome Admin!');
      loadAllData().then(() => navigateTo('dashboard'));
    } catch (err) {
      showToast(err.message);
    }
  }

  // ============================================================
  // RENDER FUNCTIONS (dashboard, catalog, places, customers, orders, etc.)
  // ============================================================
  function renderDashboard(el) {
    const totalOrders = orders.length;
    const delivered = orders.filter(o => o.status === 'Delivered');
    const pending = orders.filter(o => o.status === 'Pending');
    const processing = orders.filter(o => o.status === 'Processing');
    const cancelled = orders.filter(o => o.status === 'Cancelled');
    const totalSales = delivered.reduce((sum, o) => sum + o.grand_total, 0);
    const totalCommission = delivered.reduce((sum, o) => sum + (o.commission_amount || 0), 0);
    const totalDelivery = delivered.reduce((sum, o) => sum + (o.delivery_charge || 0), 0);
    const totalProfit = totalCommission + totalDelivery;
    const today = new Date().toDateString();
    const todayRevenue = delivered.filter(o => new Date(o.date).toDateString() === today).reduce((s, o) => s + o.grand_total, 0);
    const customersCount = customers.length;
    let bestProduct = { name: 'N/A', count: 0 };
    const productCounts = {};
    delivered.forEach(o => {
      o.items?.forEach(item => {
        productCounts[item.name] = (productCounts[item.name] || 0) + item.quantity;
      });
    });
    for (const [name, count] of Object.entries(productCounts)) {
      if (count > bestProduct.count) bestProduct = { name, count };
    }

    const stats = [
      { label: 'Total Orders', value: totalOrders, icon: 'fa-shopping-cart', color: 'blue' },
      { label: 'Total Sales', value: '₹' + totalSales.toFixed(2), icon: 'fa-rupee-sign', color: 'green' },
      { label: 'Commission', value: '₹' + totalCommission.toFixed(2), icon: 'fa-coins', color: 'yellow' },
      { label: 'Delivery', value: '₹' + totalDelivery.toFixed(2), icon: 'fa-truck', color: 'purple' },
      { label: 'Profit', value: '₹' + totalProfit.toFixed(2), icon: 'fa-hand-holding-usd', color: 'indigo' },
      { label: 'Pending', value: pending.length, icon: 'fa-clock', color: 'red' },
      { label: 'Delivered', value: delivered.length, icon: 'fa-check-circle', color: 'green' },
      { label: 'Customers', value: customersCount, icon: 'fa-users', color: 'teal' },
      { label: 'Best Seller', value: bestProduct.name, sub: bestProduct.count + ' orders', icon: 'fa-crown', color: 'pink' },
      { label: "Today's Revenue", value: '₹' + todayRevenue.toFixed(2), icon: 'fa-calendar-day', color: 'emerald' },
    ];

    const colorMap = {
      blue: 'bg-blue-100 text-blue-600',
      green: 'bg-green-100 text-green-600',
      yellow: 'bg-yellow-100 text-yellow-600',
      purple: 'bg-purple-100 text-purple-600',
      indigo: 'bg-indigo-100 text-indigo-600',
      red: 'bg-red-100 text-red-600',
      teal: 'bg-teal-100 text-teal-600',
      pink: 'bg-pink-100 text-pink-600',
      emerald: 'bg-emerald-100 text-emerald-600'
    };

    let statsHtml = stats.map(s => `
      <div class="stat-card">
        <div class="flex items-center gap-3">
          <div class="icon ${colorMap[s.color] || 'bg-gray-100 text-gray-600'}">
            <i class="fas ${s.icon}"></i>
          </div>
          <div class="min-w-0">
            <p class="stat-label">${s.label}</p>
            <p class="stat-value text-truncate">${s.value}</p>
            ${s.sub ? `<p class="text-xs text-gray-400">${s.sub}</p>` : ''}
          </div>
        </div>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="stat-grid mb-6">${statsHtml}</div>
      <div class="dashboard-charts">
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Daily Sales</h3><div class="chart-container"><canvas id="dailyChart"></canvas></div></div>
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Orders Overview</h3><div class="chart-container"><canvas id="ordersChart"></canvas></div></div>
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Commission vs Delivery</h3><div class="chart-container"><canvas id="profitChart"></canvas></div></div>
        <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Top Products</h3><div class="chart-container"><canvas id="bestSellingChart"></canvas></div></div>
      </div>
    `;

    setTimeout(() => {
      const days = [];
      const sales = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toLocaleDateString('en-IN', { weekday: 'short' }));
        const dailyTotal = orders.filter(o => new Date(o.date).toDateString() === d.toDateString() && o.status === 'Delivered')
          .reduce((s, o) => s + o.grand_total, 0);
        sales.push(dailyTotal);
      }
      new Chart(document.getElementById('dailyChart'), {
        type: 'bar',
        data: { labels: days, datasets: [{ label: 'Sales (₹)', data: sales, backgroundColor: '#007BFF', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      const statuses = ['Pending', 'Processing', 'Delivered', 'Cancelled'];
      const counts = statuses.map(s => orders.filter(o => o.status === s).length);
      new Chart(document.getElementById('ordersChart'), {
        type: 'doughnut',
        data: { labels: statuses, datasets: [{ data: counts, backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e', '#ef4444'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } } } }
      });

      const deliveredOrders = orders.filter(o => o.status === 'Delivered');
      const totalComm = deliveredOrders.reduce((s, o) => s + (o.commission_amount || 0), 0);
      const totalDeliv = deliveredOrders.reduce((s, o) => s + (o.delivery_charge || 0), 0);
      new Chart(document.getElementById('profitChart'), {
        type: 'bar',
        data: { labels: ['Commission', 'Delivery'], datasets: [{ label: 'Amount (₹)', data: [totalComm, totalDeliv], backgroundColor: ['#f59e0b', '#3b82f6'], borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      const prodCounts = {};
      deliveredOrders.forEach(o => {
        o.items?.forEach(item => { prodCounts[item.name] = (prodCounts[item.name] || 0) + item.quantity; });
      });
      const sorted = Object.entries(prodCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      new Chart(document.getElementById('bestSellingChart'), {
        type: 'bar',
        data: { labels: sorted.map(s => s[0].length > 12 ? s[0].slice(0,12)+'…' : s[0]), datasets: [{ label: 'Sold', data: sorted.map(s => s[1]), backgroundColor: '#8b5cf6', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }, 150);
  }

  // Helper: read files as base64
  async function readFilesAsDataURL(files) {
    if (!files || files.length === 0) return [];
    const promises = Array.from(files).map((file) => {
      return new Promise((res) => {
        const reader = new FileReader();
        reader.onload = (e) => res(e.target.result);
        reader.readAsDataURL(file);
      });
    });
    return await Promise.all(promises);
  }

    });
    let itemsHtml = '';
    Object.keys(grouped).forEach(cat => {
      const catItems = grouped[cat];
      const catTotal = catItems.reduce((sum, i) => sum + i.price * i.quantity, 0);
      itemsHtml += `<tr><td colspan="6" class="font-bold text-primary text-sm bg-blue-50 dark:bg-blue-900/30">${cat}</td></tr>`;
      catItems.forEach(i => {
        itemsHtml += `<tr><td>${i.name}</td><td>${i.quantity}</td><td>₹${i.price}</td><td>₹${(i.price * i.quantity).toFixed(2)}</td><td>${i.commission || 0}%</td><td>₹${(i.price * i.quantity * (i.commission||0)/100).toFixed(2)}</td></tr>`;
      });
      itemsHtml += `<tr><td colspan="5" class="text-right font-semibold text-sm">Subtotal (${cat})</td><td class="font-semibold">₹${catTotal.toFixed(2)}</td></tr>`;

      <div class="table-wrap" style="margin:0 -4px;">
        <table class="text-sm">
          <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Total</th><th>Comm %</th><th>Commission</th></tr></thead>
          <tbody>${itemsHtml}</tbody>
        </table>
      </div>
      <div class="border-t pt-2 text-right mt-2">
        <p><strong>Product Total:</strong> ₹${o.product_total}</p>
        <p><strong>Delivery:</strong> ₹${o.delivery_charge}</p>
        <p><strong>Commission:</strong> ₹${o.commission_amount}</p>
        <p class="text-lg font-bold"><strong>Grand Total:</strong> ₹${o.grand_total}</p>
        <p class="text-primary font-bold"><strong>Admin Profit:</strong> ₹${o.admin_profit}</p>
      </div>
    `);
  }

  function updateOrderStatus(id) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    const statuses = settings.orderStatuses || ['Pending', 'Processing', 'Delivered', 'Cancelled'];
    const options = statuses.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('');
    openModal(`
      <h2>Update Order Status</h2>
      <form id="statusForm">
        <div class="form-group"><label>Status</label><select id="oStatus">${options}</select></div>
        <button type="submit" class="btn btn-primary btn-block">Update</button>
      </form>
    `);
    document.getElementById('statusForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const newStatus = document.getElementById('oStatus').value;
      try {
        await putData(`orders/${id}`, { status: newStatus });
        orders = await fetchData('orders');
        closeModal();
        showToast('Order status updated');
        navigateTo('orders');
      } catch (err) { showToast('Error: ' + err.message); }
    });
  }

  // ============================================================
  // EARNINGS, REPORTS, BESTSELLING, OFFERS, NOTIFICATIONS, WHATSAPP, SETTINGS

  function renderEarnings(el) { /* same as before */ }
  function renderReports(el) { /* same as before */ }

  function renderNotifications(el) { /* same as before */ }
  function renderWhatsApp(el) { /* same as before */ }

  // ============================================================
  // SETTINGS (with admin phone switch)
  // ============================================================
  function renderSettings(el) {
    // Fetch current settings
    fetch(`${API_BASE}/settings`)
      .then(res => res.json())
      .then(settingsData => {
        const currentPhone = settingsData.active_admin_phone || '+919019825189';
        el.innerHTML = `
          <h2 class="text-xl font-bold mb-4">Settings</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Default Commission -->
            <div class="card p-4">
              <h3 class="font-semibold mb-2 text-sm">Default Commission</h3>
              <div class="flex gap-2">
                <input type="number" id="defaultComm" value="${settingsData.defaultCommission || 10}" class="flex-1 border rounded-lg px-3 py-2 text-sm" />
                <button onclick="updateSetting('defaultCommission', document.getElementById('defaultComm').value)" class="btn btn-primary">Save</button>
              </div>
            </div>

            <!-- Order Statuses -->
            <div class="card p-4">
              <h3 class="font-semibold mb-2 text-sm">Order Statuses</h3>
              <div class="flex gap-2">
                <input type="text" id="newStatus" placeholder="New status" class="flex-1 border rounded-lg px-3 py-2 text-sm" />
                <button onclick="addOrderStatus()" class="btn btn-primary">Add</button>
              </div>
              <div class="mt-2 flex flex-wrap gap-1">
                ${(settingsData.orderStatuses || ['Pending','Processing','Delivered','Cancelled']).map(s => `<span class="badge badge-info">${s} <button onclick="removeOrderStatus('${s}')" class="ml-1 text-red-500">&times;</button></span>`).join('')}
              </div>
            </div>

            <!-- Business Info -->
            <div class="card p-4">
              <h3 class="font-semibold mb-2 text-sm">Business Info</h3>
              <div class="form-group"><label>Name</label><input id="bizName" value="${settingsData.business?.name || ''}" /></div>
              <div class="form-group"><label>Email</label><input id="bizEmail" value="${settingsData.business?.email || ''}" /></div>
              <div class="form-group"><label>Phone</label><input id="bizPhone" value="${settingsData.business?.phone || ''}" /></div>
              <button onclick="updateBusinessInfo()" class="btn btn-primary btn-block">Save</button>
            </div>

            <!-- WhatsApp -->
            <div class="card p-4">
              <h3 class="font-semibold mb-2 text-sm">WhatsApp</h3>
              <div class="form-group"><label>Enabled</label><select id="waEnabled"><option value="true" ${settingsData.whatsapp?.enabled ? 'selected' : ''}>Yes</option><option value="false" ${!settingsData.whatsapp?.enabled ? 'selected' : ''}>No</option></select></div>
              <div class="form-group"><label>API Key</label><input id="waApiKey" value="${settingsData.whatsapp?.apiKey || ''}" /></div>
              <div class="form-group"><label>Phone</label><input id="waPhone" value="${settingsData.whatsapp?.phoneNumber || ''}" /></div>
              <button onclick="updateWhatsAppSettings()" class="btn btn-primary btn-block">Save</button>
            </div>

            <!-- NEW: Active Admin Phone Selector -->
            <div class="card p-4 col-span-1 md:col-span-2">
              <h3 class="font-semibold mb-2 text-sm">Active Admin Phone for Order Notifications</h3>
              <p class="text-sm text-gray-500 mb-2">Order WhatsApp notifications will be sent to the selected admin number.</p>
              <select id="adminPhoneSelect" class="w-full border rounded-lg px-3 py-2 text-sm" onchange="updateAdminPhone()">
                <option value="+919019825189" ${currentPhone === '+919019825189' ? 'selected' : ''}>+91 9019825189</option>
                <option value="+918277079552" ${currentPhone === '+918277079552' ? 'selected' : ''}>+91 8277079552</option>
              </select>
              <div id="adminPhoneStatus" class="mt-2 text-sm text-green-600"></div>
            </div>
          </div>
        `;
        // Load current settings into form fields
        document.getElementById('defaultComm').value = settingsData.defaultCommission || 10;
      })
      .catch(err => {
        el.innerHTML = `<p class="text-red-500">Error loading settings</p>`;
        console.error(err);
      });
  }

  // ============================================================
  // SETTINGS FUNCTIONS
  // ============================================================
  function updateSetting(key, value) {
    settings[key] = value;
    showToast('Setting updated (local only, extend to API if needed)');
  }

  function addOrderStatus() {
    const status = document.getElementById('newStatus').value.trim();
    if (!status) return;
    if (!settings.orderStatuses) settings.orderStatuses = [];
    settings.orderStatuses.push(status);
    showToast('Status added (local only)');
    navigateTo('settings');
  }

  function removeOrderStatus(status) {
    settings.orderStatuses = settings.orderStatuses.filter(s => s !== status);
    showToast('Status removed (local only)');
    navigateTo('settings');
  }

  function updateBusinessInfo() {
    settings.business = {
      name: document.getElementById('bizName').value.trim(),
      email: document.getElementById('bizEmail').value.trim(),
      phone: document.getElementById('bizPhone').value.trim(),
      logo: settings.business?.logo || ''
    };
    showToast('Business info updated (local only)');
  }

  function updateWhatsAppSettings() {
    settings.whatsapp = {
      enabled: document.getElementById('waEnabled').value === 'true',
      apiKey: document.getElementById('waApiKey').value.trim(),
      phoneNumber: document.getElementById('waPhone').value.trim()
    };
    showToast('WhatsApp settings updated (local only)');
  }

  async function updateAdminPhone() {
    const phone = document.getElementById('adminPhoneSelect').value;
    try {
      const res = await fetch(`${API_BASE}/settings`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: 'active_admin_phone', value: phone })
      });
      if (!res.ok) throw new Error('Update failed');
      document.getElementById('adminPhoneStatus').textContent = '✅ Updated successfully!';
      setTimeout(() => document.getElementById('adminPhoneStatus').textContent = '', 3000);
    } catch (err) {
      document.getElementById('adminPhoneStatus').textContent = '❌ Error updating';
      console.error(err);
    }
  }

  // ============================================================
  // EXPOSE FUNCTIONS
  // ============================================================
  window.navigateTo = navigateTo;
  window.switchCatalogTab = switchCatalogTab;
  window.openAddCategory = openAddCategory;
  window.editCategory = editCategory;

  window.deleteRestaurant = deleteRestaurant;
  window.openAddProduct = openAddProduct;
  window.editProduct = editProduct;
  window.deleteProduct = deleteProduct;
  window.openAddPlace = openAddPlace;
  window.editPlace = editPlace;
  window.deletePlace = deletePlace;
  window.toggleBlockCustomer = toggleBlockCustomer;
  window.viewOrder = viewOrder;
  window.updateOrderStatus = updateOrderStatus;
  window.removeExistingImage = window.removeExistingImage;
  window.toggleSidebar = toggleSidebar;
  window.closeSidebar = closeSidebar;
  window.closeModal = closeModal;
  window.showToast = showToast;
  window.sendAdminOtp = sendAdminOtp;
  window.verifyAdminOtp = verifyAdminOtp;
  window.updateAdminPhone = updateAdminPhone;
  window.updateSetting = updateSetting;
  window.addOrderStatus = addOrderStatus;
  window.removeOrderStatus = removeOrderStatus;
  window.updateBusinessInfo = updateBusinessInfo;
  window.updateWhatsAppSettings = updateWhatsAppSettings;

  // ============================================================
  // INIT
  // ============================================================
  document.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('adminLoggedIn') === 'true') {
      document.getElementById('adminLoginOverlay').classList.add('hidden');
      loadAllData().then(() => navigateTo('dashboard'));
    } else {
      document.getElementById('adminLoginOverlay').classList.remove('hidden');
    }
  });
</script>
