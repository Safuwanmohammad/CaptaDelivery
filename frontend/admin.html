<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>CaptaDelivery Admin</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#007BFF', primaryDark: '#0056b3' } } }
    };
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #f3f4f6; overflow-x: hidden; }

    .sidebar {
      background: #1e293b;
      min-height: 100vh;
      width: 280px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      position: fixed;
      top:0; left:0;
      z-index:40;
      overflow-y:auto;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar a {
      display: flex; align-items: center;
      padding: 12px 20px;
      color: #cbd5e1;
      transition: 0.2s;
      border-left: 3px solid transparent;
      font-size: 0.95rem;
      gap: 12px;
      border-radius: 0 8px 8px 0;
      margin: 2px 8px 2px 0;
      cursor: pointer;
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #334155;
      color: white;
      border-left-color: #007BFF;
    }
    .sidebar a i { width: 22px; text-align: center; font-size: 1.1rem; flex-shrink:0; }
    .sidebar a span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-brand {
      padding: 16px 20px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .sidebar-brand i { color: #007BFF; }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index:39;
      backdrop-filter: blur(4px);
    }
    .sidebar-backdrop.active { display: block; }

    .main-content {
      margin-left: 0;
      padding: 16px;
      min-height: 100vh;
      transition: margin 0.3s ease;
      padding-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      flex-wrap: wrap;
    }
    .top-bar .page-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar .page-title .menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: white;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      color: #1e293b;
      font-size: 1.2rem;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .top-bar .page-title .menu-btn:hover { background: #f1f5f9; }
    .top-bar .right-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar .right-actions .theme-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: white;
      border: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      color: #64748b;
      font-size: 1.1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-bar .right-actions .theme-btn:hover { background: #f1f5f9; }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .stat-card {
      padding: 16px;
      border-radius: 14px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: 0.2s;
    }
    .stat-card .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink:0;
      font-size: 1.1rem;
    }
    .stat-card .stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
    .stat-card .stat-label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
    }
    @media (min-width:480px) { .stat-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width:768px) { .stat-grid { grid-template-columns: repeat(4,1fr); } }
    @media (min-width:1024px) { .stat-grid { grid-template-columns: repeat(6,1fr); } }

    .btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
      touch-action: manipulation;
      user-select: none;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: #007BFF; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { background: #16a34a; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-warning:hover { background: #d97706; }
    .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
    .btn-outline:hover { background: #f3f4f6; }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }

    .badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }

    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-weight:500; font-size:0.85rem; margin-bottom:4px; color:#374151; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%;
      padding:10px 14px;
      border:1px solid #d1d5db;
      border-radius:10px;
      outline:none;
      transition:0.2s;
      font-size:0.95rem;
      background:white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#007BFF;
      box-shadow:0 0 0 3px rgba(0,123,255,0.15);
    }

    .modal-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index:999;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      inset: 0;
    }
    .modal-box {
      max-height: 90vh;
      overflow-y: auto;
      width: 100%;
      max-width: 560px;
      padding: 20px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      margin: 12px;
    }
    .modal-box .modal-close {
      position: sticky;
      top:0;
      float:right;
      background:none;
      border:none;
      font-size:1.5rem;
      color:#94a3b8;
      cursor:pointer;
      padding:4px 8px;
      z-index:10;
    }

    .table-wrap { overflow-x: auto; }
    table { width:100%; border-collapse: collapse; font-size:0.85rem; min-width:600px; }
    th { background: #f8fafc; text-align:left; padding:10px 12px; font-weight:600; font-size:0.75rem; color:#475569; }
    td { padding:10px 12px; border-bottom:1px solid #e9edf2; vertical-align:middle; }
    tr:hover td { background: #f8fafc; }

    .table-actions { display: flex; gap: 4px; flex-wrap: wrap; }

    .image-preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .preview-item { position: relative; width: 68px; height: 68px; border-radius: 10px; overflow: hidden; border: 2px solid #e5e7eb; flex-shrink:0; }
    .preview-item img { width:100%; height:100%; object-fit:cover; }

    .hide-mobile { display: none !important; }
    @media (min-width:768px) {
      .hide-mobile { display: inline-flex !important; }
      .show-mobile { display: none !important; }
      .sidebar {
        transform: none !important;
        position: fixed;
        left:0; top:0;
        width:280px;
        display: block !important;
        z-index:30;
      }
      .sidebar-backdrop { display: none !important; }
      .main-content { margin-left:280px; padding:24px 32px; }
      .top-bar .page-title .menu-btn { display: none !important; }
    }
    .show-mobile { display: inline-flex !important; }

    #notificationContainer {
      position: fixed;
      top: 12px;
      right: 12px;
      left: 12px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    #notificationContainer .toast {
      pointer-events: auto;
      background: #1e293b;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform:translateX(100%); opacity:0; }
      to { transform:translateX(0); opacity:1; }
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #007BFF;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .fade-in { animation:fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .chart-container { position:relative; height:200px; width:100%; }
    .dashboard-charts { display:grid; grid-template-columns:1fr; gap:16px; }
    @media (min-width:768px) { .dashboard-charts { grid-template-columns:1fr 1fr; } }

    .tab-btn {
      padding: 8px 14px;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.2s;
      cursor: pointer;
      font-size: 0.85rem;
      border: none;
      background: transparent;
      color: #64748b;
      white-space: nowrap;
    }
    .tab-btn.active { background: #007BFF; color: white; box-shadow: 0 4px 12px rgba(0,123,255,0.25); }
    .tab-btn:hover:not(.active) { background: #e2e8f0; }
    .tab-group-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-group-scroll::-webkit-scrollbar { display: none; }

    .gradient-btn {
      background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%);
      color: white;
      border: none;
      transition: all 0.3s ease;
    }
    .gradient-btn:hover { background: linear-gradient(135deg, #0056b3 0%, #004099 100%); }
  </style>
</head>
<body>

<!-- ========== ADMIN LOGIN OVERLAY ========== -->
<div id="adminLoginOverlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-900/80 backdrop-blur-sm">
  <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Admin Login</h2>
    <p class="text-sm text-center text-gray-500 mb-4">Enter your registered admin phone</p>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Phone</label>
        <input type="tel" id="adminPhone" placeholder="Enter admin phone" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" />
      </div>
      <div id="adminOtpSection" class="hidden">
        <label class="block text-sm font-medium text-gray-700">OTP</label>
        <div class="flex gap-2">
          <input type="text" id="adminOtp" placeholder="Enter OTP" class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" />
          <button onclick="verifyAdminOtp()" class="btn btn-primary px-6 py-3 rounded-xl font-semibold">Verify</button>
        </div>
      </div>
      <button onclick="sendAdminOtp()" id="adminSendOtpBtn" class="btn btn-primary w-full text-white py-3 rounded-xl font-semibold">Send OTP</button>
    </div>
    <p class="text-center text-xs text-gray-400 mt-4">OTP will be sent to your phone.</p>
  </div>
</div>

<!-- ========== SIDEBAR BACKDROP ========== -->
<div id="sidebarBackdrop" class="sidebar-backdrop" onclick="closeSidebar()"></div>

<!-- ========== SIDEBAR ========== -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-brand">
    <i class="fas fa-store"></i>
    <span>CaptaDelivery</span>
  </div>
  <nav class="mt-2" id="sidebarNav">
    <a href="#" data-page="dashboard" class="active"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
    <a href="#" data-page="catalog"><i class="fas fa-boxes"></i><span>Catalog</span></a>
    <a href="#" data-page="places"><i class="fas fa-map-pin"></i><span>Delivery Places</span></a>
    <a href="#" data-page="customers"><i class="fas fa-users"></i><span>Customers</span></a>
    <a href="#" data-page="orders"><i class="fas fa-truck"></i><span>Orders</span></a>
    <a href="#" data-page="earnings"><i class="fas fa-coins"></i><span>Earnings</span></a>
    <a href="#" data-page="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
    <a href="#" data-page="bestselling"><i class="fas fa-crown"></i><span>Best Selling</span></a>

  </nav>
  <div class="absolute bottom-4 left-0 w-full px-4 space-y-1">
    <a href="#" onclick="logoutAdmin()" class="text-red-400 hover:text-red-300 block px-4 py-2 flex items-center gap-3">
      <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
    </a>
    <a href="index.html" class="text-gray-400 hover:text-white block px-4 py-2 flex items-center gap-3">
      <i class="fas fa-store-alt"></i> <span>Back to Store</span>
    </a>
  </div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div id="mainContent" class="main-content">

  <div class="top-bar">
    <div class="page-title">
      <button class="menu-btn show-mobile" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1 id="pageTitle">Dashboard</h1>
    </div>
    <div class="right-actions">
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <span class="admin-badge"><i class="fas fa-user-shield mr-1"></i> Admin</span>
    </div>
  </div>

  <div id="pageContent" class="fade-in"></div>

<!-- ========== MODAL CONTAINER ========== -->
<div id="modalContainer" class="fixed inset-0 hidden modal-overlay" style="display:none;">
  <div class="modal-box">
    <button id="closeModal" class="modal-close"><i class="fas fa-times"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ========== TOAST CONTAINER ========== -->
<div id="notificationContainer"></div>

<script>
// ============================================================
// API BASE
// ============================================================
const API_BASE = window.location.origin + '/api';

// ============================================================
// DATA HELPERS
// ============================================================
async function fetchData(endpoint) {
  const res = await fetch(`${API_BASE}/${endpoint}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function postData(endpoint, data) {
  const res = await fetch(`${API_BASE}/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const errorData = await res.json().catch(() => ({}));
    throw new Error(errorData.message || errorData.error || `HTTP ${res.status}`);
  }
  return await res.json();
}

async function putData(endpoint, data) {
  const res = await fetch(`${API_BASE}/${endpoint}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    const errorData = await res.json().catch(() => ({}));
    throw new Error(errorData.message || errorData.error || `HTTP ${res.status}`);
  }
  return await res.json();
}

async function deleteData(endpoint) {
  const res = await fetch(`${API_BASE}/${endpoint}`, { method: 'DELETE' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// ============================================================
// GLOBAL STATE
// ============================================================
let categories = [];
let restaurants = [];
let products = [];
let places = [];
let customers = [];
let orders = [];
let offers = [];
let settings = {};
let currentPage = 'dashboard';
let catalogTab = 'categories';

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const container = document.getElementById('notificationContainer');
  if (!container) { alert(msg); return; }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = '0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ============================================================
// SIDEBAR / MODAL / THEME
// ============================================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('active');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('active');
}

function openModal(html) {
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalContainer').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalContainer').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('modalContainer').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// NAVIGATION
// ============================================================
document.querySelectorAll('#sidebarNav a').forEach(link => {
  link.addEventListener('click', function(e) {
    e.preventDefault();
    navigateTo(this.dataset.page);
    closeSidebar();
  });
});

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('#sidebarNav a').forEach(a => a.classList.remove('active'));
  const sidebarLink = document.querySelector(`#sidebarNav a[data-page="${page}"]`);
  if (sidebarLink) sidebarLink.classList.add('active');

  const titles = {
    dashboard: 'Dashboard',
    catalog: 'Catalog',
    places: 'Delivery Places',
    customers: 'Customers',
    orders: 'Orders',
    earnings: 'Earnings',
    reports: 'Reports',
    bestselling: 'Best Selling',
    offers: 'Offers',
    settings: 'Settings'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page.charAt(0).toUpperCase() + page.slice(1).replace('-', ' ');
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// PAGE RENDERER
// ============================================================
function renderPage(page) {
  const content = document.getElementById('pageContent');
  content.style.opacity = '0';
  content.style.transform = 'translateY(8px)';
  content.style.transition = '0.2s ease';
  setTimeout(() => {
    switch (page) {
      case 'dashboard': renderDashboard(content); break;
      case 'catalog': renderCatalog(content); break;
      case 'places': renderPlaces(content); break;
      case 'customers': renderCustomers(content); break;
      case 'orders': renderOrders(content); break;
      case 'earnings': renderEarnings(content); break;
      case 'reports': renderReports(content); break;
      case 'bestselling': renderBestSelling(content); break;
      case 'offers': renderOffers(content); break;
      case 'settings': renderSettings(content); break;
      default: content.innerHTML = '<p class="text-gray-500 text-center py-8">Page not found</p>';
    }
    content.style.opacity = '1';
    content.style.transform = 'translateY(0)';
  }, 50);
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadAllData() {
  try {
    const [cats, rests, prods, plcs, custs, ords, offs, setts] = await Promise.all([
      fetchData('categories'),
      fetchData('restaurants'),
      fetchData('products'),
      fetchData('places'),
      fetchData('customers'),
      fetchData('orders'),
      fetchData('offers'),
      fetchData('settings')
    ]);
    categories = cats || [];
    restaurants = rests || [];
    products = prods || [];
    places = plcs || [];
    customers = custs || [];
    orders = ords || [];
    offers = offs || [];
    settings = setts || {};
    console.log('✅ Loaded data:', { categories: categories.length, products: products.length, orders: orders.length });
  } catch (err) {
    console.error('Failed to load data:', err);
    showToast('Error loading data from server. Check backend.');
  }
}

// ============================================================
// ADMIN LOGIN
// ============================================================
async function sendAdminOtp() {
  const phone = document.getElementById('adminPhone').value.trim();
  if (!phone || phone.length < 10) {
    showToast('Please enter a valid phone number');
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/auth/admin/send-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
    document.getElementById('adminOtpSection').classList.remove('hidden');
    document.getElementById('adminSendOtpBtn').textContent = 'Resend OTP';
    showToast('OTP sent to your phone!');
  } catch (err) {
    showToast(err.message);
  }
}

async function verifyAdminOtp() {
  const phone = document.getElementById('adminPhone').value.trim();
  const otp = document.getElementById('adminOtp').value.trim();
  if (!otp) { showToast('Enter OTP'); return; }
  try {
    const res = await fetch(`${API_BASE}/auth/admin/verify-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, otp })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Verification failed');
    localStorage.setItem('adminLoggedIn', 'true');
    localStorage.setItem('adminPhone', phone);
    document.getElementById('adminLoginOverlay').classList.add('hidden');
    showToast('Welcome Admin!');
    loadAllData().then(() => navigateTo('dashboard'));
  } catch (err) {
    showToast(err.message);
  }
}

function logoutAdmin() {
  if (confirm('Are you sure you want to logout?')) {
    localStorage.removeItem('adminLoggedIn');
    localStorage.removeItem('adminPhone');
    location.reload();
  }
}

// ============================================================
function renderDashboard(el) {
  const totalOrders = orders.length;
  const delivered = orders.filter(o => o.status === 'Delivered');
  const pending = orders.filter(o => o.status === 'Pending');
  const processing = orders.filter(o => o.status === 'Processing');
  const cancelled = orders.filter(o => o.status === 'Cancelled');
  const totalSales = delivered.reduce((sum, o) => sum + (o.grand_total || 0), 0);
  const totalCommission = delivered.reduce((sum, o) => sum + (o.commission_amount || 0), 0);
  const totalDelivery = delivered.reduce((sum, o) => sum + (o.delivery_charge || 0), 0);
  const totalRain = delivered.reduce((sum, o) => sum + (o.rain_fare || 0), 0);
  const totalProfit = totalCommission + totalDelivery + totalRain;
  const today = new Date().toDateString();
  const todayRevenue = delivered.filter(o => new Date(o.date).toDateString() === today).reduce((s, o) => s + (o.grand_total || 0), 0);
  const customersCount = customers.length;

  const stats = [
    { label: 'Total Orders', value: totalOrders, icon: 'fa-shopping-cart', color: 'blue' },
    { label: 'Total Sales', value: '₹' + totalSales.toFixed(2), icon: 'fa-rupee-sign', color: 'green' },
    { label: 'Commission', value: '₹' + totalCommission.toFixed(2), icon: 'fa-coins', color: 'yellow' },
    { label: 'Delivery', value: '₹' + totalDelivery.toFixed(2), icon: 'fa-truck', color: 'purple' },
    { label: 'Rain Fare', value: '₹' + totalRain.toFixed(2), icon: 'fa-cloud-rain', color: 'indigo' },
    { label: 'Profit', value: '₹' + totalProfit.toFixed(2), icon: 'fa-hand-holding-usd', color: 'pink' },
    { label: 'Pending', value: pending.length, icon: 'fa-clock', color: 'red' },
    { label: 'Delivered', value: delivered.length, icon: 'fa-check-circle', color: 'green' },
    { label: 'Customers', value: customersCount, icon: 'fa-users', color: 'teal' },
    { label: "Today's Revenue", value: '₹' + todayRevenue.toFixed(2), icon: 'fa-calendar-day', color: 'amber' }
  ];

  const colorMap = {
    blue: 'bg-blue-100 text-blue-600',
    green: 'bg-green-100 text-green-600',
    yellow: 'bg-yellow-100 text-yellow-600',
    purple: 'bg-purple-100 text-purple-600',
    indigo: 'bg-indigo-100 text-indigo-600',
    red: 'bg-red-100 text-red-600',
    teal: 'bg-teal-100 text-teal-600',
    pink: 'bg-pink-100 text-pink-600',
    amber: 'bg-amber-100 text-amber-600'
  };

  let statsHtml = stats.map(s => `
    <div class="stat-card">
      <div class="flex items-center gap-3">
        <div class="icon ${colorMap[s.color] || 'bg-gray-100 text-gray-600'}">
          <i class="fas ${s.icon}"></i>
        </div>
        <div class="min-w-0">
          <p class="stat-label">${s.label}</p>
          <p class="stat-value">${s.value}</p>
        </div>
      </div>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="stat-grid mb-6">${statsHtml}</div>
    <div class="dashboard-charts">
      <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Daily Sales</h3><div class="chart-container"><canvas id="dailyChart"></canvas></div></div>
      <div class="card p-4"><h3 class="font-semibold mb-2 text-sm">Orders Overview</h3><div class="chart-container"><canvas id="ordersChart"></canvas></div></div>
    </div>
  `;

  setTimeout(() => {
    if (typeof Chart !== 'undefined') {
      const days = [];
      const sales = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        days.push(d.toLocaleDateString('en-IN', { weekday: 'short' }));
        const dailyTotal = orders.filter(o => new Date(o.date).toDateString() === d.toDateString() && o.status === 'Delivered')
          .reduce((s, o) => s + (o.grand_total || 0), 0);
        sales.push(dailyTotal);
      }
      new Chart(document.getElementById('dailyChart'), {
        type: 'bar',
        data: { labels: days, datasets: [{ label: 'Sales (₹)', data: sales, backgroundColor: '#007BFF', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });

      const statuses = ['Pending', 'Processing', 'Delivered', 'Cancelled'];
      const counts = statuses.map(s => orders.filter(o => o.status === s).length);
      new Chart(document.getElementById('ordersChart'), {
        type: 'doughnut',
        data: { labels: statuses, datasets: [{ data: counts, backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e', '#ef4444'] }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8 } } } }
      });
    } else {
      console.warn('Chart.js not loaded');
    }
  }, 200);
}

function editProduct(id) {
  const p = (products || []).find(x => x.id === id);
  if (!p) { showToast('Product not found'); return; }

  const restaurantOptions = (restaurants || []).map(r => 
    `<option value="${r.id}" ${p.restaurant_id === r.id ? 'selected' : ''}>${r.name}</option>`
  ).join('');

  const categoryOptions = (categories || []).map(c => 
    `<option value="${c.name}" ${p.category === c.name ? 'selected' : ''}>${c.name}</option>`
  ).join('');

  let imagePreviewHtml = '';
  if (p.images && p.images.length > 0) {
    p.images.forEach((img, index) => {
      imagePreviewHtml += `
        <div class="preview-item" id="img-container-${index}">
          <img src="${img}" />
          <button type="button" class="remove-img" onclick="removeExistingImage(${index}, '${p.id}')">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `;
    });
  }

  openModal(`
    <h2>Edit Product</h2>
    <form id="productForm">
      <div class="form-group"><label>Product Name *</label><input id="prodName" value="${p.name}" required /></div>
      <div class="form-group"><label>Category *</label>
        <select id="prodCategory" required>
          <option value="">Select Category</option>
          ${categoryOptions}
        </select>
      </div>
      <div class="form-group"><label>Restaurant (optional)</label>
        <select id="prodRestaurant">
          <option value="">None</option>
          ${restaurantOptions}
        </select>
      </div>
      <div class="form-group"><label>Base Price (₹) *</label><input id="prodPrice" type="number" step="0.01" value="${p.price}" required /></div>
      <div class="form-group"><label>Commission (%)</label><input id="prodCommission" type="number" step="0.01" value="${p.commission || 0}" /></div>
      <div class="form-group"><label>Status</label>
        <select id="prodStatus">
          <option value="Active" ${p.status === 'Active' ? 'selected' : ''}>Active</option>
          <option value="Inactive" ${p.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
        </select>
      </div>
      <div class="form-group"><label>Current Images</label>
        <div id="existingImages" class="image-preview-grid">
          ${imagePreviewHtml || '<p class="text-gray-400 text-sm">No images</p>'}
        </div>
      </div>
      <div class="form-group"><label>Add New Images (optional)</label>
        <div class="file-input-wrapper">
          <div class="file-btn"><i class="fas fa-cloud-upload-alt"></i> Upload Images</div>
          <input id="prodImages" type="file" accept="image/*" multiple />
        </div>
        <div id="prodImagePreview" class="image-preview-grid"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Update Product</button>
    </form>
  `);

  const fileInput = document.getElementById('prodImages');
  const previewContainer = document.getElementById('prodImagePreview');
  let newImageUrls = [];

  fileInput.addEventListener('change', function() {
    previewContainer.innerHTML = '';
    newImageUrls = [];
    const files = this.files;
    for (let i = 0; i < files.length; i++) {
      const reader = new FileReader();
      reader.onload = function(e) {
        newImageUrls.push(e.target.result);
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
          <img src="${e.target.result}" />
          <button type="button" class="remove-img" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
          </button>
        `;
        previewContainer.appendChild(div);
      };
      reader.readAsDataURL(files[i]);
    }
  });

  document.getElementById('productForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('prodName').value.trim();
    const category = document.getElementById('prodCategory').value;
    const restaurantId = document.getElementById('prodRestaurant').value || null;
    const price = parseFloat(document.getElementById('prodPrice').value);
    const commission = parseFloat(document.getElementById('prodCommission').value) || 0;
    const status = document.getElementById('prodStatus').value;

    if (!name) { showToast('Product name required'); return; }
    if (!category) { showToast('Category required'); return; }
    if (!price || isNaN(price)) { showToast('Valid price required'); return; }

    let existingImages = p.images || [];
    let allImages = existingImages;
    if (newImageUrls.length > 0) {
      allImages = [...allImages, ...newImageUrls];
    }

    try {
      await putData(`products/${id}`, { name, category, restaurantId, price, commission, status, images: allImages });
      products = await fetchData('products');
      closeModal();
      showToast('Product updated successfully!');
      switchCatalogTab('products');
    } catch (err) { 
      console.error('Error:', err);
      showToast('Error: ' + err.message); 
    }
  });
}

function removeExistingImage(index, productId) {
  if (!confirm('Remove this image?')) return;
  const p = (products || []).find(x => x.id === parseInt(productId));
  if (!p) return;
  if (p.images && p.images.length > index) {
    p.images.splice(index, 1);
    const container = document.getElementById(`img-container-${index}`);
    if (container) container.remove();
    showToast('Image removed. Save the product to apply changes.');
  }
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  deleteData(`products/${id}`)
    .then(() => fetchData('products'))
    .then(data => {
      products = data;
      showToast('Product deleted successfully!');
      switchCatalogTab('products');
    })
    .catch(err => showToast('Error: ' + err.message));
}

function renderEarnings(el) {
  const delivered = (orders || []).filter(o => o.status === 'Delivered');
  const totalCommission = delivered.reduce((s, o) => s + (o.commission_amount || 0), 0);
  const totalDelivery = delivered.reduce((s, o) => s + (o.delivery_charge || 0), 0);
  const totalRain = delivered.reduce((s, o) => s + (o.rain_fare || 0), 0);
  const totalProfit = totalCommission + totalDelivery + totalRain;

  el.innerHTML = `
    <h2 class="text-xl font-bold mb-4">Earnings</h2>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="stat-card"><p class="stat-label">Commission</p><p class="stat-value">₹${totalCommission.toFixed(2)}</p></div>
      <div class="stat-card"><p class="stat-label">Delivery Charges</p><p class="stat-value">₹${totalDelivery.toFixed(2)}</p></div>
      <div class="stat-card"><p class="stat-label">Rain Fare</p><p class="stat-value">₹${totalRain.toFixed(2)}</p></div>
      <div class="stat-card"><p class="stat-label">Total Profit</p><p class="stat-value">₹${totalProfit.toFixed(2)}</p></div>
    </div>
  `;
}

// ============================================================
function renderBestSelling(el) {
  const delivered = (orders || []).filter(o => o.status === 'Delivered');
  const productCounts = {};
  delivered.forEach(o => {
    (o.items || []).forEach(item => {
      productCounts[item.name] = (productCounts[item.name] || 0) + (item.quantity || 0);
    });
  });
  const sorted = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);

  el.innerHTML = `
    <h2 class="text-xl font-bold mb-4">Best Selling Products</h2>
    <div class="card p-3 table-wrap">
      <table>
        <thead><tr><th>#</th><th>Product</th><th>Quantity Sold</th></tr></thead>
        <tbody>
          ${sorted.length === 0 ? '<tr><td colspan="3" class="text-center text-gray-400">No data</td></tr>' :
            sorted.map(([name, qty], i) => `
              <tr>
                <td>${i+1}</td>
                <td>${name}</td>
                <td>${qty}</td>
              </tr>
            `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
